<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>T-PACHIN · 我的收藏 · 立體金屬風</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;500;700;900&family=Noto+Sans+JP:wght@300;500;700;900&family=Russo+One&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        /* ========== 基礎樣式 ========== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: #0a0c1a;
            color: #fff;
            font-family: 'Noto Sans JP', 'Noto Sans TC', 'Orbitron', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(74, 128, 192, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(153, 0, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }
        
        .max-w-md {
            max-width: 448px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            z-index: 1;
            background: linear-gradient(145deg, #0f1425, #0a0e1f);
            box-shadow: 0 0 50px rgba(74, 128, 192, 0.2);
            border-left: 1px solid rgba(74, 128, 192, 0.2);
            border-right: 1px solid rgba(153, 0, 255, 0.2);
        }
        
        .metal-header {
            background: linear-gradient(145deg, #2a2f3f, #1a1f2f);
            border-bottom: 2px solid #4a80c0;
            border-top: 2px solid #4a80c0;
            box-shadow: 
                0 5px 0 #0f121c,
                0 10px 15px rgba(74, 128, 192, 0.3),
                inset 0 2px 5px rgba(255, 255, 255, 0.3),
                inset 0 -3px 8px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
            border-radius: 0 0 30px 30px;
            padding: 0.75rem 1rem;
        }

        .metal-header::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: skewX(-20deg);
            animation: shine 4s infinite;
            pointer-events: none;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 120%; }
            100% { left: 120%; }
        }

        .logo { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-family: 'Orbitron', 'Russo One', sans-serif; 
            white-space: nowrap; 
            cursor: pointer; 
            transition: transform 0.2s ease; 
            text-decoration: none; 
            color: inherit; 
            background: transparent; 
            border: none; 
            padding: 0; 
            position: relative;
            z-index: 2;
        }
        .logo:active { transform: scale(0.97); }
        .logo-icon {
            width: 40px; height: 40px; 
            background: linear-gradient(135deg, #000, #111, #222); 
            border-radius: 12px; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 0 15px rgba(74, 128, 192, 0.5), inset 0 0 10px rgba(255, 215, 0, 0.2); 
            overflow: hidden; 
            border: 2px solid #ffd700;
        }
        .logo-icon::before {
            content: ''; 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            background: conic-gradient(from 0deg, transparent, #4a80c0, #c90a0a, #ffd700, transparent); 
            animation: logoRotate 4s linear infinite;
        }
        .logo-icon::after { 
            content: ''; 
            position: absolute; 
            width: 30px; 
            height: 30px; 
            background: #000; 
            border-radius: 8px; 
        }
        @keyframes logoRotate { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }
        .logo-icon-inner { 
            position: relative; 
            z-index: 2; 
            font-size: 16px; 
            font-weight: 900; 
            background: linear-gradient(45deg, #ffdf00, #ffec8b, #4a80c0); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            background-clip: text; 
        }
        .logo-text { 
            display: flex; 
            flex-direction: column; 
            line-height: 1.1; 
        }
        .logo-main { 
            font-size: 18px; 
            font-weight: 900; 
            background: linear-gradient(45deg, #ffdf00, #ffd700, #4a80c0); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            background-clip: text; 
            animation: textShine 3s ease-in-out infinite alternate; 
        }
        .logo-sub { 
            font-size: 9px; 
            color: #4a80c0; 
            font-weight: 500; 
            letter-spacing: 0.8px; 
            text-shadow: 0 0 4px rgba(74, 128, 192, 0.5); 
        }
        @keyframes textShine {
            from { filter: brightness(1); }
            to { filter: brightness(1.2); text-shadow: 0 0 10px #ffd700; }
        }

        .nickname-display {
            color: #ffffff;
            text-shadow: 0 2px 3px black, 0 0 10px rgba(255,255,255,0.3);
            font-weight: 600;
            transition: all 0.2s ease;
            font-size: 1.3rem;
            line-height: 1.3;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
            text-decoration: none;
            cursor: pointer;
        }
        .nickname-display:hover {
            color: #ffd966;
            text-shadow: 0 0 10px #ffd700, 0 2px 3px black;
        }

        .points-display {
            background: linear-gradient(145deg, #4a3a1a, #3a2a0a);
            padding: 0.15rem 1.5rem;
            border-radius: 30px;
            box-shadow: 
                inset 0 2px 5px rgba(255, 215, 0, 0.5),
                inset 0 -3px 5px rgba(0, 0, 0, 0.6),
                0 4px 0 #2a1f0a,
                0 0 12px #ffd700;
            border: 1px solid #ffd700;
            color: #ffd966;
            font-weight: 900;
            font-size: 1.1rem;
            text-shadow: 0 2px 3px black;
            cursor: pointer;
            transition: all 0.1s ease;
            line-height: 1.3;
            min-width: 100px;
            text-align: center;
            letter-spacing: 0.5px;
            text-decoration: none;
            display: inline-block;
        }
        .points-display:hover {
            transform: translateY(-2px);
            box-shadow: 
                inset 0 2px 5px rgba(255, 215, 0, 0.6),
                inset 0 -3px 5px rgba(0, 0, 0, 0.5),
                0 6px 0 #2a1f0a,
                0 0 20px #ffd700;
        }
        .points-display:active {
            transform: translateY(2px);
            box-shadow: 
                inset 0 5px 8px rgba(0, 0, 0, 0.6),
                inset 0 -2px 5px rgba(255, 215, 0, 0.3),
                0 2px 0 #2a1f0a;
        }

        .announcement-combo {
            background: linear-gradient(145deg, #2a2f3f, #1a1f2f);
            border: 1px solid #4a80c0;
            border-radius: 40px;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            position: relative;
            overflow: hidden;
            box-shadow: 
                inset 0 2px 5px rgba(255,255,255,0.3),
                inset 0 -3px 8px rgba(0,0,0,0.6),
                0 5px 0 #0f121c;
        }
        .combo-announce-btn {
            background: linear-gradient(145deg, #3a5065, #2a4055);
            color: white;
            border-radius: 30px;
            padding: 0.25rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.8rem;
            font-weight: bold;
            text-decoration: none;
            white-space: nowrap;
            z-index: 2;
            border: 1px solid #4a80c0;
            box-shadow: 
                inset 0 2px 3px rgba(255,255,255,0.3),
                inset 0 -3px 5px rgba(0,0,0,0.4),
                0 3px 0 #0f121c;
        }
        .combo-announce-btn:active {
            transform: translateY(2px);
            box-shadow: 
                inset 0 3px 5px rgba(0,0,0,0.5),
                inset 0 -2px 3px rgba(255,255,255,0.2);
        }
        
        .marquee-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            height: 24px;
            mask-image: linear-gradient(90deg, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(90deg, transparent, black 10%, black 90%, transparent);
        }
        
        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            color: #b3e4ff;
            font-size: 0.8rem;
            text-shadow: 0 2px 3px black;
            animation: marquee 15s linear infinite;
            padding-left: 20px;
        }
        
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        
        .marquee-content:hover {
            animation-play-state: paused;
        }

        .category-tabs-container { 
            display: flex; 
            justify-content: center; 
            gap: 1rem; 
            padding: 0.8rem 0; 
            width: 100%; 
        }
        .category-tab {
            background: linear-gradient(145deg, #3a4050, #2a2f40);
            border: 1px solid #4a80c0;
            border-radius: 30px;
            padding: 0.6rem 1.2rem; 
            font-size: 0.9rem; 
            color: #b0c4de;
            transition: all 0.1s ease; 
            cursor: pointer; 
            white-space: nowrap; 
            flex: 0 1 auto;
            text-align: center; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 0.5rem;
            font-family: 'Noto Sans TC', 'Noto Sans JP', sans-serif;
            box-shadow: 
                inset 0 2px 5px rgba(255,255,255,0.3),
                inset 0 -3px 5px rgba(0,0,0,0.4),
                0 5px 0 #0f121c;
            text-shadow: 0 2px 3px rgba(0,0,0,0.5);
        }
        .category-tab:hover { 
            transform: translateY(-2px);
            box-shadow: 
                inset 0 2px 5px rgba(255,255,255,0.4),
                inset 0 -3px 5px rgba(0,0,0,0.3),
                0 7px 0 #0f121c,
                0 0 15px #4a80c0;
            color: white;
        }
        .category-tab:active { 
            transform: translateY(3px);
            box-shadow: 
                inset 0 5px 8px rgba(0,0,0,0.5),
                inset 0 -2px 5px rgba(255,255,255,0.2),
                0 2px 0 #0f121c;
        }
        .category-tab.active { 
            background: linear-gradient(145deg, #4a5065, #3a4055);
            color: white;
            border: 1px solid #4a80c0;
            box-shadow: 
                0 0 15px #4a80c0,
                inset 0 2px 8px rgba(255,255,255,0.6),
                inset 0 -3px 8px rgba(0,0,0,0.4),
                0 5px 0 #0f121c;
            text-shadow: 0 0 8px #4a80c0;
        }

        .section-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 1rem; 
            border-bottom: 2px solid #4a80c0; 
            padding-bottom: 0.3rem; 
        }
        .section-title { 
            font-size: 1.1rem; 
            color: #fff; 
            font-family: 'Noto Sans TC', 'Noto Sans JP'; 
            font-weight: 700; 
            text-shadow: 0 0 10px #4a80c0, 0 2px 3px black; 
        }
        .section-title i { 
            color: #ff66ff; 
            text-shadow: 0 0 10px #ff66ff; 
        }
        .section-count { 
            font-size: 0.8rem; 
            background: linear-gradient(145deg, #3a4050, #2a2f40);
            padding: 0.2rem 0.8rem; 
            border-radius: 30px; 
            border: 1px solid #4a80c0; 
            color: #ffd966;
            box-shadow: inset 0 1px 3px rgba(255,255,255,0.3), inset 0 -2px 3px rgba(0,0,0,0.4);
            white-space: nowrap;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .flip-card {
            background: linear-gradient(145deg, #2a2f3f, #1a1f2f);
            border: 2px solid #4a80c0;
            border-radius: 24px;
            position: relative;
            transition: all 0.2s ease;
            box-shadow: 
                inset 0 2px 5px rgba(255,255,255,0.3),
                inset 0 -3px 8px rgba(0,0,0,0.6),
                0 8px 0 #0f121c,
                0 10px 20px rgba(74, 128, 192, 0.3);
            cursor: pointer;
            width: 100%;
            padding: 1rem 0.9rem 0.8rem 0.9rem;
            margin-bottom: 1.5rem;
        }
        .flip-card:hover {
            transform: translateY(-5px);
            box-shadow: 
                inset 0 2px 5px rgba(255,255,255,0.3),
                inset 0 -3px 8px rgba(0,0,0,0.6),
                0 13px 0 #0f121c,
                0 15px 30px rgba(74, 128, 192, 0.5);
        }
        .flip-card:active {
            transform: translateY(4px);
            box-shadow: 
                inset 0 5px 10px rgba(0,0,0,0.7),
                inset 0 -2px 5px rgba(255,255,255,0.2),
                0 4px 0 #0f121c;
        }

        .page-indicator { 
            display: flex; 
            justify-content: center; 
            gap: 0.8rem; 
            margin-top: 0.6rem; 
            margin-bottom: 0.8rem;
        }
        .dot { 
            width: 8px; 
            height: 8px; 
            border-radius: 50%; 
            background: #3a4050; 
            border: 1px solid #4a80c0;
            box-shadow: inset 0 2px 3px rgba(255,255,255,0.3);
        }
        .dot.active { 
            background: #f0c45a; 
            border-color: #ffd700; 
            box-shadow: 0 0 10px #ffd700, inset 0 2px 5px white;
            transform: scale(1.2); 
        }

        .page1-row1 { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 0.5rem; 
        }
        .model-name { 
            font-size: 1rem; 
            font-weight: 700; 
            color: #ffdb8e; 
            font-family: 'Noto Sans TC', 'Noto Sans JP', sans-serif; 
            text-shadow: 0 2px 3px black;
            flex: 1;
        }
        .model-name strong { 
            font-size: 1.15rem; 
            font-weight: 900; 
            color: white; 
            margin-right: 4px; 
            background: rgba(0,0,0,0.3); 
            padding: 0 4px; 
            border-radius: 4px;
            box-shadow: inset 0 1px 3px rgba(255,255,255,0.2);
        }

        .ratio-mini {
            font-size: 0.9rem; 
            font-weight: 700; 
            background: linear-gradient(145deg, #3a4050, #2a2f40);
            padding: 0.2rem 0.8rem;
            border-radius: 30px; 
            border: 1px solid #4a80c0; 
            color: #ffeca2;
            box-shadow: inset 0 2px 3px rgba(255,255,255,0.3), inset 0 -3px 5px rgba(0,0,0,0.4);
            margin-left: 6px;
        }

        .page1-reserve-row {
            display: flex; 
            align-items: center; 
            gap: 0.8rem; 
            background: linear-gradient(145deg, #2a3a4f, #1a2a3f);
            border-radius: 40px;
            padding: 0.2rem 1.2rem 0.2rem 1rem; 
            border: 2px solid #e5a73e; 
            width: fit-content; 
            margin: 0.3rem 0 1rem 0;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.3), inset 0 -3px 5px rgba(0,0,0,0.4);
        }
        .reserve-text { 
            font-size: 0.9rem; 
            font-weight: 700; 
            color: #f6c445; 
            text-transform: uppercase; 
        }
        .time-big { 
            font-family: 'Orbitron', monospace; 
            font-size: 1.3rem; 
            font-weight: 800; 
            color: #ffbc5c; 
            letter-spacing: 1px; 
        }

        .page1-played-row {
            display: flex; 
            align-items: center; 
            gap: 0.8rem; 
            background: linear-gradient(145deg, #1a3a4d, #0a2a3f);
            border-radius: 40px;
            padding: 0.2rem 1.2rem 0.2rem 1rem; 
            border: 2px solid #4a9eff; 
            width: fit-content; 
            margin: 0.3rem 0 1rem 0;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.3), inset 0 -3px 5px rgba(0,0,0,0.4);
        }
        .played-text { 
            font-size: 0.9rem; 
            font-weight: 700; 
            color: #7ac7ff; 
            text-transform: uppercase; 
        }
        .played-date { 
            font-family: 'Orbitron', monospace; 
            font-size: 1rem; 
            font-weight: 700; 
            color: #a0d0ff; 
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            margin: 0.8rem 0 0.2rem 0;
        }
        .stat-cell {
            background: linear-gradient(145deg, #1a2a3a, #0a1a2a);
            border: 1px solid #4a80c0;
            border-radius: 20px;
            padding: 0.5rem 0.2rem;
            text-align: center;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.2), inset 0 -3px 5px rgba(0,0,0,0.5);
        }
        .stat-label { 
            font-size: 0.65rem; 
            color: #9ac2f0; 
            margin-bottom: 0.2rem;
            text-align: center;
        }
        .stat-number { 
            font-size: 1.2rem; 
            font-weight: 900; 
            line-height: 1.2;
            text-align: center;
            font-family: 'Orbitron';
        }
        .bb-number { color: #ff7b7b; }
        .rb-number { color: #73d98e; }
        .curr-number { color: #7ec8ff; }
        .total-number { color: #fad05b; }

        .favorite-card .page1-reserve-row { display: none; }
        .played-card .page1-reserve-row { display: none; }
        .played-card .page1-played-row { display: flex; }

        .vertical-cards-container {
            display: flex;
            gap: 4px;
            margin: 0.5rem 0 0.2rem 0;
            justify-content: space-between;
        }
        
        .vertical-card {
            flex: 1;
            background: linear-gradient(145deg, #1a2a3a, #0a1a2a);
            border: 1px solid #4a80c0;
            border-radius: 20px;
            padding: 0.4rem 0.1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 0;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.2), inset 0 -3px 5px rgba(0,0,0,0.5);
        }
        
        .card-number {
            font-size: 1rem;
            font-weight: 700;
            color: #ffd966;
            margin-bottom: 0.3rem;
            text-align: center;
        }
        
        .card-bars {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 0 2px;
            margin-bottom: 0.3rem;
            justify-content: flex-end;
            flex: 1;
            min-height: 45px;
        }
        
        .card-bar-segment {
            width: 100%;
            height: 8px;
            background: #203a55;
            border-radius: 4px;
            box-shadow: inset 0 1px 3px rgba(255,255,255,0.2);
        }
        
        .card-bar-segment.filled-red {
            background: linear-gradient(90deg, #e03a3a, #b11b1b);
            box-shadow: 0 0 4px #ff4d4d, inset 0 1px 3px rgba(255,255,255,0.3);
        }
        
        .card-bar-segment.filled-green {
            background: linear-gradient(90deg, #2ecb2e, #1a911a);
            box-shadow: 0 0 4px #39ff39, inset 0 1px 3px rgba(255,255,255,0.3);
        }
        
        .card-single {
            font-size: 0.45rem;
            color: #97bbdf;
            margin: 0.1rem 0;
            text-align: center;
        }
        
        .card-value {
            font-size: 0.7rem;
            font-weight: 600;
            color: #b3eeff;
            font-family: 'Orbitron', monospace;
            text-align: center;
        }

        .card-actions { 
            display: flex; 
            gap: 0.5rem; 
            margin-top: 0.2rem; 
            align-items: center; 
        }
        .enter-btn, .leave-btn {
            background: linear-gradient(145deg, #3a5065, #2a4055);
            border: 1px solid #4a80c0;
            color: white;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 0.4rem 0.6rem;
            border-radius: 30px;
            transition: all 0.1s ease;
            letter-spacing: 1px;
            flex: 2;
            text-align: center;
            cursor: pointer;
            font-family: 'Noto Sans TC', 'Noto Sans JP', sans-serif;
            box-shadow: 
                inset 0 2px 5px rgba(255,255,255,0.3),
                inset 0 -3px 5px rgba(0,0,0,0.4),
                0 5px 0 #0f121c;
            text-shadow: 0 2px 3px black;
        }
        .enter-btn:hover, .leave-btn:hover {
            transform: translateY(-2px);
            box-shadow: 
                inset 0 2px 5px rgba(255,255,255,0.4),
                inset 0 -3px 5px rgba(0,0,0,0.3),
                0 7px 0 #0f121c,
                0 0 15px #4a80c0;
        }
        .enter-btn:active, .leave-btn:active {
            transform: translateY(3px);
            box-shadow: 
                inset 0 5px 8px rgba(0,0,0,0.6),
                inset 0 -2px 5px rgba(255,255,255,0.2),
                0 2px 0 #0f121c;
        }
        .leave-btn {
            background: linear-gradient(145deg, #653a3a, #552a2a);
            border-color: #ff6666;
        }
        .favorite-btn {
            width: 36px; 
            height: 36px; 
            background: linear-gradient(145deg, #3a4050, #2a2f40);
            border: 1px solid #4a80c0;
            border-radius: 50%;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 
                inset 0 2px 5px rgba(255,255,255,0.3),
                inset 0 -3px 5px rgba(0,0,0,0.4),

<script>
(function() {
    // ==================== 點數管理 (localStorage 同步) ====================
    const POINTS_KEY = 't_pachin_user_points';
    let points = 6600;

    function initPoints() {
        try {
            const stored = localStorage.getItem(POINTS_KEY);
            if (stored !== null) {
                points = parseInt(stored, 10);
                if (isNaN(points)) points = 6600;
            } else {
                points = 6600;
                localStorage.setItem(POINTS_KEY, points);
            }
        } catch(e) {
            points = 6600;
        }
        updatePointsDisplay();
    }
    initPoints();

    function updatePointsDisplay() {
        const pointsEl = document.querySelector('.points-display');
        if (pointsEl) pointsEl.textContent = points.toLocaleString();
        
        const confirmPointsSpan = document.getElementById('confirmPoints');
        if (confirmPointsSpan) confirmPointsSpan.textContent = points.toLocaleString();
        const tokenRemainSpan = document.getElementById('confirmTokenRemain');
        if (tokenRemainSpan) tokenRemainSpan.textContent = `剩餘點數: ${points.toLocaleString()}`;
    }

    function savePoints() {
        try {
            localStorage.setItem(POINTS_KEY, points);
        } catch(e) {}
        updatePointsDisplay();
        window.dispatchEvent(new CustomEvent('points-updated', { detail: { points: points } }));
    }

    function updatePoints(changeAmount) {
        points = Math.max(0, points + changeAmount);
        savePoints();
        return points;
    }

    // ==================== Loading 控制 ====================
    const hologramLoading = document.getElementById('hologramLoading');
    const loadingMachineTitle = document.getElementById('loadingMachineTitle');
    const mascotVideo = document.getElementById('mascotVideo');
    function showHologramLoading(machineName = '超級奇蹟小丑', machineId = 1, ratio = '2') {
        loadingMachineTitle.textContent = `${machineName} NO.${machineId} 每枚${ratio}`;
        if (mascotVideo) mascotVideo.play().catch(e => console.log('影片播放失敗:', e));
        hologramLoading.classList.add('show');
    }
    function hideHologramLoading() {
        hologramLoading.classList.remove('show');
        if (mascotVideo) { mascotVideo.pause(); mascotVideo.currentTime = 0; }
    }

    // ==================== 子機台確認彈窗 ====================
    const subModal = document.getElementById('subConfirmModal');
    const confirmMachineName = document.getElementById('confirmMachineName');
    const confirmSubName = document.getElementById('confirmSubName');
    const confirmRatioSpan = document.getElementById('confirmRatio');
    const confirmPointsSpan = document.getElementById('confirmPoints');
    const tokenInput = document.getElementById('confirmTokenInput');
    const tokenRemainSpan = document.getElementById('confirmTokenRemain');
    const cancelBtn = document.getElementById('confirmCancel');
    const okBtn = document.getElementById('confirmOk');
    let currentSubData = null;

    window.openSubConfirm = function(machineName, subName, ratio, machineId) {
        confirmMachineName.textContent = machineName;
        confirmSubName.textContent = subName;
        confirmRatioSpan.textContent = ratio;
        confirmPointsSpan.textContent = points.toLocaleString();
        tokenInput.value = '';
        tokenInput.min = 100;
        tokenInput.max = points;
        tokenRemainSpan.textContent = `剩餘點數: ${points.toLocaleString()}`;
        currentSubData = { machineName, subName, ratio, machineId };
        subModal.classList.add('show');
    };

    tokenInput.addEventListener('input', function() {
        let val = parseInt(this.value) || 0;
        if (val > points) { val = points; this.value = points; }
        if (val < 0) val = 0;
        tokenRemainSpan.textContent = `剩餘點數: ${(points - val).toLocaleString()}`;
    });

    cancelBtn.addEventListener('click', () => subModal.classList.remove('show'));

    okBtn.addEventListener('click', function() {
        let tokenUsed = parseInt(tokenInput.value) || 0;
        if (tokenUsed < 100) {
            window.showAlertMessage('⚠️ 最低兌換限制', '進入遊戲最少需要 100 枚代幣，請重新輸入。', true);
            return;
        }
        if (tokenUsed > points) {
            window.showAlertMessage('❌ 點數不足', '您的代幣不足，請補充後再試。', true);
            return;
        }
        points -= tokenUsed;
        savePoints();
        subModal.classList.remove('show');
        showHologramLoading(currentSubData.machineName, currentSubData.machineId || 1, currentSubData.ratio);
        setTimeout(() => {
            hideHologramLoading();
            const machineInfo = {
                name: currentSubData.machineName,
                subName: currentSubData.subName,
                ratio: currentSubData.ratio,
                machineId: currentSubData.machineId,
                coins: tokenUsed
            };
            localStorage.setItem('t_pachin_machine_info', JSON.stringify(machineInfo));
            window.location.href = 'simulator.html';
        }, 5000);
    });

    subModal.addEventListener('click', (e) => { if (e.target === subModal) subModal.classList.remove('show'); });

    // ==================== 通用提示彈窗 (支援觸控滑動 + 滑鼠拖曳關閉) ====================
    window.showAlertMessage = function(title, message, isUrgent = false) {
        const container = document.getElementById('alertContainer');
        const alertDiv = document.createElement('div');
        alertDiv.className = 'alert-popup';
        if (isUrgent) alertDiv.classList.add('urgent');
        alertDiv.innerHTML = `
            <div class="alert-icon"><i class="fa ${isUrgent ? 'fa-exclamation-triangle' : 'fa-info-circle'}"></i></div>
            <div class="alert-content">
                <div class="alert-title">${title}</div>
                <div class="alert-message">${message}</div>
            </div>
            <div class="alert-swipe-hint"><i class="fa fa-arrow-up"></i></div>
        `;
        container.appendChild(alertDiv);
        
        let startY = 0, currentY = 0, isDragging = false;
        let startTime = 0;
        
        // 觸控事件 (手機)
        const touchStart = (e) => {
            startY = e.touches[0].clientY;
            startTime = Date.now();
            isDragging = true;
            alertDiv.style.transition = 'none';
            e.preventDefault();
        };
        
        const touchMove = (e) => {
            if (!isDragging) return;
            currentY = e.touches[0].clientY;
            let diff = currentY - startY;
            if (diff < 0) {
                alertDiv.style.transform = `translateX(-50%) translateY(${diff}px)`;
                let opacity = Math.max(0, 1 + diff / 150);
                alertDiv.style.opacity = opacity;
            }
            e.preventDefault();
        };
        
        const touchEnd = () => {
            if (!isDragging) return;
            isDragging = false;
            let diff = currentY - startY;
            let timeDiff = Date.now() - startTime;
            
            if (diff < -50 || (diff < -30 && timeDiff < 200)) {
                alertDiv.style.transform = `translateX(-50%) translateY(-200px)`;
                alertDiv.style.opacity = '0';
                setTimeout(() => {
                    if (alertDiv.parentNode) alertDiv.remove();
                }, 200);
            } else {
                alertDiv.style.transform = '';
                alertDiv.style.opacity = '';
                alertDiv.style.transition = '';
            }
        };
        
        // 滑鼠事件 (電腦)
        const mouseDown = (e) => {
            startY = e.clientY;
            startTime = Date.now();
            isDragging = true;
            alertDiv.style.transition = 'none';
            e.preventDefault();
        };
        
        const mouseMove = (e) => {
            if (!isDragging) return;
            currentY = e.clientY;
            let diff = currentY - startY;
            if (diff < 0) {
                alertDiv.style.transform = `translateX(-50%) translateY(${diff}px)`;
                let opacity = Math.max(0, 1 + diff / 150);
                alertDiv.style.opacity = opacity;
            }
            e.preventDefault();
        };
        
        const mouseUp = () => {
            if (!isDragging) return;
            isDragging = false;
            let diff = currentY - startY;
            let timeDiff = Date.now() - startTime;
            
            if (diff < -50 || (diff < -30 && timeDiff < 200)) {
                alertDiv.style.transform = `translateX(-50%) translateY(-200px)`;
                alertDiv.style.opacity = '0';
                setTimeout(() => {
                    if (alertDiv.parentNode) alertDiv.remove();
                }, 200);
            } else {
                alertDiv.style.transform = '';
                alertDiv.style.opacity = '';
                alertDiv.style.transition = '';
            }
            document.removeEventListener('mousemove', mouseMove);
            document.removeEventListener('mouseup', mouseUp);
        };
        
        // 綁定觸控事件 (手機)
        alertDiv.addEventListener('touchstart', touchStart, { passive: false });
        alertDiv.addEventListener('touchmove', touchMove, { passive: false });
        alertDiv.addEventListener('touchend', touchEnd);
        
        // 綁定滑鼠事件 (電腦)
        alertDiv.addEventListener('mousedown', (e) => {
            mouseDown(e);
            document.addEventListener('mousemove', mouseMove);
            document.addEventListener('mouseup', mouseUp);
        });
        
        // 8秒後自動消失
        setTimeout(() => {
            if (alertDiv.parentNode) {
                alertDiv.style.transform = `translateX(-50%) translateY(-200px)`;
                alertDiv.style.opacity = '0';
                setTimeout(() => {
                    if (alertDiv.parentNode) alertDiv.remove();
                }, 200);
            }
        }, 8000);
    };

    // ==================== 機台資料庫 ====================
    const machineDatabase = [
        { id: 1, name: '超級奇蹟小丑', sub: '', ratio: '2', bb: 2, rb: 2, curr: 284, total: 2800 },
        { id: 2, name: '超級奇蹟小丑', sub: '', ratio: '1', bb: 3, rb: 5, curr: 512, total: 4100 },
        { id: 3, name: '新我是小丑-EX', sub: '', ratio: '2', bb: 2, rb: 2, curr: 284, total: 2800 },
        { id: 4, name: '超級小丑', sub: '狂歡版', ratio: '3', bb: 4, rb: 3, curr: 678, total: 5200 },
        { id: 5, name: '小丑之王', sub: '黃金版', ratio: '1', bb: 5, rb: 4, curr: 445, total: 3800 }
    ];
    let favoriteMachines = [ { ...machineDatabase[0] }, { ...machineDatabase[2] } ];
    let reserveMachines = [
        { id: 101, name: '新我是小丑-EX', sub: '', ratio: '2', reserveTime: '00:10:59', expiresAt: Date.now() + 9*60*1000, bb:2, rb:2, curr:284, total:2800 },
        { id: 102, name: '超級奇蹟小丑', sub: '', ratio: '2', reserveTime: '15:30:00', expiresAt: Date.now() + 25*60*1000, bb:3, rb:5, curr:512, total:4100 }
    ];
    let playedMachines = [
        { id: 201, name: '超級奇蹟小丑', sub: 'EX版', ratio: '2', playedDate: '2024-02-15', playCount:3, bb:2, rb:2, curr:284, total:2800 },
        { id: 202, name: '新我是小丑-EX', sub: '', ratio: '2', playedDate: '2024-02-14', playCount:5, bb:2, rb:2, curr:284, total:2800 },
        { id: 203, name: '超級小丑', sub: '狂歡版', ratio: '3', playedDate: '2024-02-13', playCount:2, bb:4, rb:3, curr:678, total:5200 }
    ];

    const barValues1 = [1003, 491, 271, 786, 75, 47, 582, 349];
    function generateVerticalCards() {
        let cards = '';
        for (let i=0;i<8;i++) {
            let fillCount = Math.floor(Math.random()*5)+1;
            let bars = [];
            for(let s=0;s<5;s++) {
                if(s<fillCount) { let isRed=Math.random()>0.5; bars.push(`<div class="card-bar-segment ${isRed?'filled-red':'filled-green'}"></div>`); }
                else { bars.push(`<div class="card-bar-segment"></div>`); }
            }
            bars.reverse();
            cards += `<div class="vertical-card"><div class="card-number">${i+1}</div><div class="card-bars">${bars.join('')}</div><div class="card-single">單發</div><div class="card-value">${barValues1[i]}</div></div>`;
        }
        return cards;
    }

    function createCardHTML(machine, type='favorite') {
        const isFav = favoriteMachines.some(f=>f.id===machine.id);
        let topRow = '';
        if(type==='reserve') topRow = `<div class="page1-reserve-row"><span class="reserve-text">保留中</span><span class="time-big">${machine.reserveTime||'00:10:59'}</span></div>`;
        else if(type==='played') topRow = `<div class="page1-played-row"><span class="played-text">玩過 ${machine.playCount||1}次</span><span class="played-date">${machine.playedDate||'2024-02-15'}</span></div>`;
        return `<div class="flip-card ${type}-card" data-machine-id="${machine.id}" data-page="1"><div class="page page-1"><div class="page1-row1"><div class="model-name"><strong>NO.${machine.id}</strong> ${machine.name} <span style="color:#aac9ff;">${machine.sub||''}</span></div><span class="ratio-mini">每枚${machine.ratio}</span></div>${topRow}<div class="stats-grid"><div class="stat-cell"><div class="stat-label">BB</div><div class="stat-number bb-number">${machine.bb}</div></div><div class="stat-cell"><div class="stat-label">RB</div><div class="stat-number rb-number">${machine.rb}</div></div><div class="stat-cell"><div class="stat-label">當前</div><div class="stat-number curr-number">${machine.curr}</div></div><div class="stat-cell"><div class="stat-label">總回</div><div class="stat-number total-number">${machine.total}</div></div></div></div><div class="page page-2 hidden"><div class="vertical-cards-container">${generateVerticalCards()}</div></div><div class="page-indicator"><span class="dot active"></span><span class="dot"></span></div><div class="card-actions"><button class="enter-btn" onclick="window.openSubConfirm('${machine.name}', '主機台', '${machine.ratio}', ${machine.id})">進入遊戲</button>${type==='reserve'? `<button class="leave-btn" onclick="window.showLeaveConfirm(${machine.id}, '${machine.name}')">離開</button>` : ''}<button class="favorite-btn ${isFav?'active':'inactive'}" onclick="window.toggleFavorite(${machine.id})"><i class="fa ${isFav?'fa-heart':'fa-heart-o'}"></i></button></div></div>`;
    }

    function renderFavoriteList() {
        const container = document.getElementById('favoriteContainer'), noMsg = document.getElementById('noFavoriteMsg'), countSpan = document.getElementById('favoriteCount');
        if(favoriteMachines.length===0){ container.innerHTML=''; noMsg.classList.remove('hidden'); countSpan.textContent='0 台'; } 
        else { noMsg.classList.add('hidden'); countSpan.textContent=favoriteMachines.length+' 台'; container.innerHTML=favoriteMachines.map(m=>createCardHTML(m,'favorite')).join(''); }
        bindFlipEvents();
    }
    function renderReserveList() {
        const container = document.getElementById('reserveContainer'), noMsg = document.getElementById('noReserveMsg'), countSpan = document.getElementById('reserveCount');
        if(reserveMachines.length===0){ container.innerHTML=''; noMsg.classList.remove('hidden'); countSpan.textContent='0 台'; } 
        else { noMsg.classList.add('hidden'); countSpan.textContent=reserveMachines.length+' 台'; container.innerHTML=reserveMachines.map(m=>createCardHTML(m,'reserve')).join(''); }
        bindFlipEvents();
    }
    function renderPlayedList() {
        const container = document.getElementById('playedContainer'), noMsg = document.getElementById('noPlayedMsg'), countSpan = document.getElementById('playedCount');
        if(playedMachines.length===0){ container.innerHTML=''; noMsg.classList.remove('hidden'); countSpan.textContent='0 台'; } 
        else { noMsg.classList.add('hidden'); countSpan.textContent=playedMachines.length+' 台'; container.innerHTML=playedMachines.map(m=>createCardHTML(m,'played')).join(''); }
        bindFlipEvents();
    }

    function handleCardClick(event) {
        if(event.target.closest('button')) return;
        const card = event.currentTarget;
        const page1=card.querySelector('.page-1'), page2=card.querySelector('.page-2'), dots=card.querySelectorAll('.dot');
        if(!page1||!page2) return;
        if(!page1.classList.contains('hidden')){ page1.classList.add('hidden'); page2.classList.remove('hidden'); dots[0].classList.remove('active'); dots[1].classList.add('active'); }
        else{ page2.classList.add('hidden'); page1.classList.remove('hidden'); dots[1].classList.remove('active'); dots[0].classList.add('active'); }
    }
    function bindFlipEvents() {
        document.querySelectorAll('.flip-card').forEach(c=>{ c.removeEventListener('click', handleCardClick); c.addEventListener('click', handleCardClick); });
    }

    window.showLeaveConfirm = function(id,name){
        const container=document.getElementById('confirmContainer');
        if(document.getElementById(`confirm-${id}`)) return;
        const dialog=document.createElement('div'); dialog.className='confirm-dialog'; dialog.id=`confirm-${id}`;
        dialog.innerHTML=`<div class="confirm-content"><h3 class="text-yellow-400 font-bold text-lg mb-2">離開保留</h3><p class="my-4 text-white">確定離開 <span class="text-blue-300 font-bold">${name}</span> 嗎？</p><div class="confirm-buttons"><button class="confirm-btn cancel bg-gray-600 hover:bg-gray-700" onclick="closeLeaveConfirm(${id})">取消</button><button class="confirm-btn confirm bg-red-600 hover:bg-red-700" onclick="confirmLeave(${id})">確定離開</button></div></div>`;
        container.appendChild(dialog);
    };
    window.closeLeaveConfirm = function(id){ document.getElementById(`confirm-${id}`)?.remove(); };
    window.confirmLeave = function(id){ reserveMachines = reserveMachines.filter(m=>m.id!==id); renderReserveList(); closeLeaveConfirm(id); };
    window.toggleFavorite = function(id){
        let machine = machineDatabase.find(m=>m.id===id) || reserveMachines.find(m=>m.id===id) || playedMachines.find(m=>m.id===id);
        if(!machine) return;
        const idx = favoriteMachines.findIndex(f=>f.id===id);
        if(idx!==-1) favoriteMachines.splice(idx,1);
        else favoriteMachines.push({...machine});
        renderFavoriteList(); renderReserveList(); renderPlayedList();
    };

    // 分類切換
    document.querySelectorAll('.category-tab').forEach(tab=>{
        tab.addEventListener('click',function(){
            document.querySelectorAll('.category-tab').forEach(t=>t.classList.remove('active'));
            this.classList.add('active');
            const target=this.dataset.tab;
            document.querySelectorAll('.category-section').forEach(s=>s.classList.add('hidden'));
            document.getElementById(target+'-section').classList.remove('hidden');
        });
    });

    // ==================== 保留倒數警示窗 (支援觸控滑動 + 滑鼠拖曳關閉) ====================
    setInterval(()=>{
        const now=Date.now();
        reserveMachines.forEach(m=>{
            if(m.expiresAt && m.expiresAt-now<=600000 && m.expiresAt>now){
                const alertContainer=document.getElementById('alertContainer');
                if(document.querySelector(`.alert-popup[data-id="${m.id}"]`)) return;
                const alert=document.createElement('div'); 
                alert.className='alert-popup'; 
                alert.setAttribute('data-id',m.id);
                const mins=Math.floor((m.expiresAt-now)/60000);
                if(mins<=1) alert.classList.add('urgent');
                
                alert.innerHTML=`
                    <div class="alert-icon"><i class="fa fa-exclamation-triangle"></i></div>
                    <div class="alert-content">
                        <div class="alert-title">⚠️ 即將到期</div>
                        <div class="alert-message">${m.name} 剩餘 ${mins}分鐘</div>
                    </div>
                    <div class="alert-swipe-hint"><i class="fa fa-arrow-up"></i></div>
                `;
                alertContainer.appendChild(alert);
                
                let startY=0,curY=0,isDragging=false;
                let startTime=0;
                
                // 觸控事件
                const ts=e=>{ 
                    startY=e.touches[0].clientY; 
                    startTime=Date.now();
                    isDragging=true; 
                    alert.style.transition='none'; 
                    e.preventDefault();
                };
                
                const tm=e=>{ 
                    if(!isDragging) return; 
                    curY=e.touches[0].clientY; 
                    let d=curY-startY; 
                    if(d<0) {
                        alert.style.transform=`translateX(-50%) translateY(${d}px)`;
                        let opacity = Math.max(0, 1 + d / 150);
                        alert.style.opacity = opacity;
                    }
                    e.preventDefault();
                };
                
                const te=e=>{ 
                    if(!isDragging) return; 
                    isDragging=false; 
                    let d=curY-startY;
                    let timeDiff=Date.now()-startTime;
                    
                    if(d<-50 || (d<-30 && timeDiff<200)) {
                        alert.style.transform=`translateX(-50%) translateY(-200px)`;
                        alert.style.opacity='0';
                        setTimeout(()=>{
                            if(alert.parentNode) alert.remove();
                        },200);
                    } else {
                        alert.style.transform='';
                        alert.style.opacity='';
                        alert.style.transition='';
                    }
                };
                
                // 滑鼠事件
                const mouseDown = (e) => {
                    startY = e.clientY;
                    startTime = Date.now();
                    isDragging = true;
                    alert.style.transition = 'none';
                    e.preventDefault();
                };
                
                const mouseMove = (e) => {
                    if (!isDragging) return;
                    curY = e.clientY;
                    let d = curY - startY;
                    if (d < 0) {
                        alert.style.transform = `translateX(-50%) translateY(${d}px)`;
                        let opacity = Math.max(0, 1 + d / 150);
                        alert.style.opacity = opacity;
                    }
                    e.preventDefault();
                };
                
                const mouseUp = () => {
                    if (!isDragging) return;
                    isDragging = false;
                    let d = curY - startY;
                    let timeDiff = Date.now() - startTime;
                    
                    if (d < -50 || (d < -30 && timeDiff < 200)) {
                        alert.style.transform = `translateX(-50%) translateY(-200px)`;
                        alert.style.opacity = '0';
                        setTimeout(() => {
                            if (alert.parentNode) alert.remove();
                        }, 200);
                    } else {
                        alert.style.transform = '';
                        alert.style.opacity = '';
                        alert.style.transition = '';
                    }
                    document.removeEventListener('mousemove', mouseMove);
                    document.removeEventListener('mouseup', mouseUp);
                };
                
                // 綁定觸控事件
                alert.addEventListener('touchstart', ts, { passive: false });
                alert.addEventListener('touchmove', tm, { passive: false });
                alert.addEventListener('touchend', te);
                
                // 綁定滑鼠事件
                alert.addEventListener('mousedown', (e) => {
                    mouseDown(e);
                    document.addEventListener('mousemove', mouseMove);
                    document.addEventListener('mouseup', mouseUp);
                });
                
                setTimeout(()=>{ 
                    if(alert.parentNode) {
                        alert.style.transform=`translateX(-50%) translateY(-200px)`;
                        alert.style.opacity='0';
                        setTimeout(()=>{
                            if(alert.parentNode) alert.remove();
                        },200);
                    }
                },10000);
            }
        });
    },10000);

    renderFavoriteList(); renderReserveList(); renderPlayedList();
    document.getElementById('newsBadge').style.display = 'block';
})();
