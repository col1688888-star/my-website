<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>T-PACHIN · 我的收藏 · 完整版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Russo+One&display=swap" rel="stylesheet">
    <style>
        /* ===== 基礎科技風格 ===== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .tech-gradient {
            background: linear-gradient(180deg, #000814 0%, #001233 50%, #001845 100%);
        }
        .tech-border {
            border: 1px solid rgba(0, 148, 255, 0.4);
        }

        /* ===== 導航列 ===== */
        .bottom-nav {
            background: #001a33;
            border-top: 2px solid #0066cc;
            box-shadow: 0 -2px 10px rgba(0, 102, 204, 0.3);
            width: 100%;
            max-width: 448px;
            padding: 0.75rem 1.5rem;
            margin-top: 1rem;
            z-index: 50;
        }

        .nav-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #4b9cd3;
            transition: all 0.2s ease;
            border-radius: 8px;
            padding: 0.25rem 0.5rem;
            text-decoration: none;
            outline: none;
        }

        .nav-item:hover {
            color: #80e4ff;
            transform: translateY(-2px);
            text-shadow: 0 0 6px #00ccff;
            background: rgba(0, 153, 255, 0.15);
        }

        .nav-item:active {
            transform: scale(0.95);
            color: white;
            background: rgba(0, 204, 255, 0.3);
        }

        .nav-item.current-page {
            color: white;
            background: linear-gradient(90deg, #0066cc 0%, #0099ff 100%);
            border: 1px solid #80e4ff;
            box-shadow: 0 0 12px #00ccff;
            transform: scale(1.02);
        }

        /* ===== Logo 樣式 ===== */
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Orbitron', 'Russo One', sans-serif;
            white-space: nowrap;
            cursor: pointer;
            transition: transform 0.2s ease;
            text-decoration: none;
            color: inherit;
        }
        .logo:active { transform: scale(0.97); }
        .logo-icon {
            width: 40px; height: 40px; background: linear-gradient(135deg, #000, #111, #222);
            border-radius: 8px; position: relative; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0, 224, 255, 0.5), inset 0 0 10px rgba(255, 215, 0, 0.2);
            overflow: hidden; border: 2px solid #ffd700; flex-shrink: 0;
        }
        .logo-icon::before {
            content: ''; position: absolute; width: 100%; height: 100%;
            background: conic-gradient(from 0deg, transparent, #00e0ff, #c90a0a, #ffd700, transparent);
            animation: logoRotate 4s linear infinite;
        }
        .logo-icon::after { content: ''; position: absolute; width: 30px; height: 30px; background: #000; border-radius: 5px; }
        @keyframes logoRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .logo-icon-inner { position: relative; z-index: 2; font-size: 16px; font-weight: 900; background: linear-gradient(45deg, #ffdf00, #ffec8b, #00e0ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .logo-main { font-size: 18px; font-weight: 900; background: linear-gradient(45deg, #ffdf00, #ffd700, #00e0ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .logo-sub { font-size: 9px; color: #00e0ff; }

        /* ===== 分類標籤 (三個) ===== */
        .category-tabs-container { 
            display: flex; 
            justify-content: center; 
            gap: 0.8rem; 
            padding: 0.5rem 0; 
            width: 100%; 
        }
        .category-tab {
            background: rgba(0, 40, 70, 0.6); 
            border: 1px solid rgba(0, 153, 255, 0.3);
            border-radius: 9999px; 
            padding: 0.6rem 1.2rem; 
            font-size: 0.9rem; 
            color: #cce6ff;
            transition: all 0.2s; 
            cursor: pointer; 
            white-space: nowrap; 
            flex: 0 1 auto;
            text-align: center; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 0.5rem;
        }
        .category-tab.active { 
            background: linear-gradient(90deg, #0066cc, #0099ff); 
            color: white; 
            border-color: #80e4ff; 
            box-shadow: 0 0 15px #00ccff; 
        }

        /* ===== 公告按鈕框 ===== */
        .announcement-combo {
            background: linear-gradient(145deg, #001f3f, #001a33); border: 1px solid #0099ff80; border-radius: 9999px;
            box-shadow: 0 0 20px rgba(0, 153, 255, 0.4); backdrop-filter: blur(2px);
            padding: 0.25rem 0.25rem 0.25rem 0.75rem; display: inline-flex; align-items: center; width: 100%;
            position: relative; overflow: hidden; min-height: 42px;
        }
        .combo-announce-btn {
            background: linear-gradient(145deg, #0066cc, #0099ff); border: 1px solid #80e4ff; border-radius: 9999px;
            padding: 0.25rem 1rem; font-weight: 700; font-size: 0.85rem; box-shadow: 0 0 12px #00ccff;
            transition: 0.2s; white-space: nowrap; display: inline-flex; align-items: center; gap: 6px;
            color: white; text-decoration: none; letter-spacing: 0.3px; margin-right: 10px; flex-shrink: 0; z-index: 2;
        }
        .combo-marquee { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; color: #b3e6ff; font-weight: 700; font-size: 0.85rem; text-shadow: 0 0 6px #0099ff; padding-right: 0.5rem; z-index: 2; }

        /* ===== 緊湊雙頁卡片 ===== */
        .flip-card {
            background: #0e1a2c; border: 2px solid #2f6eb0; border-radius: 24px;
            padding: 1rem 0.9rem 0.8rem 0.9rem;
            box-shadow: 0 12px 25px rgba(0,0,0,0.8); margin-bottom: 0.9rem;
            cursor: pointer; transition: 0.2s;
            position: relative;
        }
        .flip-card:active { border-color: #f5b841; transform: scale(0.99); }
        .page { display: block; }
        .page.hidden { display: none; }
        .page-indicator { display: flex; justify-content: center; gap: 0.8rem; margin-top: 0.6rem; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #30557a; border: 1px solid #6fa2df; }
        .dot.active { background: #f0c45a; border-color: #ffdb8e; box-shadow: 0 0 8px #f9d170; transform: scale(1.2); }

        /* 第一頁 (資訊頁) - 格子排版 */
        .page1-row1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .model-name { font-size: 1rem; font-weight: 700; color: #ffdb8e; }
        .model-name strong { font-size: 1.15rem; font-weight: 900; color: white; margin-right: 2px; }
        .ratio-mini {
            font-size: 1rem; font-weight: 700; background: #1f3c5c; padding: 0.1rem 0.8rem;
            border-radius: 2rem; border: 1px solid #8ab8ff; color: #ffeca2; line-height: 1.4;
        }

        /* 保留時間列 */
        .page1-reserve-row {
            display: flex; align-items: center; gap: 0.8rem; background: #1e3148; border-radius: 4rem;
            padding: 0.2rem 1.2rem 0.2rem 1rem; border: 2px solid #e5a73e; width: fit-content; margin: 0.3rem 0 1rem 0;
        }
        .reserve-text { font-size: 0.9rem; font-weight: 700; color: #f6c445; text-transform: uppercase; }
        .time-big { font-family: 'Orbitron', monospace; font-size: 1.3rem; font-weight: 800; color: #ffbc5c; letter-spacing: 1px; }

        /* 玩過機台標籤 */
        .page1-played-row {
            display: flex; align-items: center; gap: 0.8rem; background: #1a334d; border-radius: 4rem;
            padding: 0.2rem 1.2rem 0.2rem 1rem; border: 2px solid #4a9eff; width: fit-content; margin: 0.3rem 0 1rem 0;
        }
        .played-text { font-size: 0.9rem; font-weight: 700; color: #7ac7ff; text-transform: uppercase; }
        .played-date { font-family: 'Orbitron', monospace; font-size: 1rem; font-weight: 700; color: #a0d0ff; }

        /* 格子排版 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            margin: 0.8rem 0 0.2rem 0;
        }
        .stat-cell {
            background: #11263b;
            border: 1px solid #3e75b5;
            border-radius: 12px;
            padding: 0.5rem 0.2rem;
            text-align: center;
        }
        .stat-label { 
            font-size: 0.65rem; 
            color: #9ac2f0; 
            margin-bottom: 0.2rem;
            text-align: center;
        }
        .stat-number { 
            font-size: 1.2rem; 
            font-weight: 900; 
            line-height: 1.2;
            text-align: center;
        }
        .bb-number { color: #ff7b7b; }
        .rb-number { color: #73d98e; }
        .curr-number { color: #7ec8ff; }
        .total-number { color: #fad05b; }

        .favorite-card .page1-reserve-row { display: none; }
        .played-card .page1-reserve-row { display: none; }
        .played-card .page1-played-row { display: flex; }

        /* ===== 第二頁：獨立垂直卡片 ===== */
        .vertical-cards-container {
            display: flex;
            gap: 4px;
            margin: 0.5rem 0 0.2rem 0;
            justify-content: space-between;
        }
        
        .vertical-card {
            flex: 1;
            background: #0f1f30;
            border: 1px solid #3b74b5;
            border-radius: 12px;
            padding: 0.4rem 0.1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 0;
        }
        
        .card-number {
            font-size: 1rem;
            font-weight: 700;
            color: #ffd966;
            margin-bottom: 0.3rem;
            text-align: center;
        }
        
        .card-bars {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 0 2px;
            margin-bottom: 0.3rem;
            justify-content: flex-end;
            flex: 1;
            min-height: 45px;
        }
        
        .card-bar-segment {
            width: 100%;
            height: 8px;
            background: #203a55;
            border-radius: 2px;
        }
        
        .card-bar-segment.filled-red {
            background: linear-gradient(90deg, #e03a3a, #b11b1b);
            box-shadow: 0 0 4px #ff4d4d;
        }
        
        .card-bar-segment.filled-green {
            background: linear-gradient(90deg, #2ecb2e, #1a911a);
            box-shadow: 0 0 4px #39ff39;
        }
        
        .card-single {
            font-size: 0.45rem;
            color: #97bbdf;
            margin: 0.1rem 0;
            text-align: center;
        }
        
        .card-value {
            font-size: 0.7rem;
            font-weight: 600;
            color: #b3eeff;
            font-family: 'Orbitron', monospace;
            text-align: center;
        }

        /* 按鈕區域 */
        .card-actions { display: flex; gap: 0.5rem; margin-top: 0.6rem; align-items: center; }
        .enter-btn, .leave-btn {
            padding: 0.4rem 0.6rem; border-radius: 0.6rem; font-size: 0.85rem; font-weight: 600; flex: 2; text-align: center; cursor: pointer; border: none;
        }
        .enter-btn { background: linear-gradient(90deg, #10b981, #059669); color: white; }
        .leave-btn { background: linear-gradient(90deg, #ef4444, #b91c1c); color: white; }
        .favorite-btn {
            width: 36px; height: 36px; background: rgba(0,30,60,0.8); border: 1px solid rgba(0,148,255,0.5);
            border-radius: 0.6rem; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .favorite-btn.active { background: rgba(255,105,180,0.25); border-color: #ff69b4; box-shadow: 0 0 12px #ff1493; }
        .favorite-btn.active i { color: #ff69b4; font-size: 1.1rem; }
        .favorite-btn.inactive i { color: #9ca3af; font-size: 1.1rem; }

        /* ===== 炫光全像投影 Loading 動畫 ===== */
        .hologram-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 999999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hologram-loading.show {
            opacity: 1;
            visibility: visible;
        }

        .hologram-content {
            text-align: center;
            position: relative;
            transform: scale(0.8);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .hologram-loading.show .hologram-content {
            transform: scale(1);
        }

        .hologram-circle {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            position: relative;
            border-radius: 50%;
            background: linear-gradient(45deg, #00ccff, #0066cc, #00ccff);
            background-size: 200% 200%;
            animation: hologram-gradient 3s ease infinite;
            box-shadow: 
                0 0 30px rgba(0, 204, 255, 0.5),
                inset 0 0 30px rgba(0, 204, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hologram-inner-circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #000;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0, 204, 255, 0.5);
        }

        .hologram-inner-circle::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg,
                transparent,
                #00ccff,
                #ffd700,
                #00ccff,
                transparent
            );
            animation: hologram-rotate 3s linear infinite;
        }

        .hologram-scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent, 
                #00ccff, 
                #ffffff, 
                #00ccff, 
                transparent
            );
            box-shadow: 0 0 20px #00ccff;
            animation: scan-move 2s ease-in-out infinite;
            opacity: 0.8;
        }

        .hologram-scan-line.delay {
            animation: scan-move 2s ease-in-out infinite 1s;
            top: auto;
            bottom: 0;
            background: linear-gradient(90deg, 
                transparent, 
                #ffd700, 
                #ffffff, 
                #ffd700, 
                transparent
            );
        }

        .hologram-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(0,204,255,0.3) 0%, transparent 70%);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .hologram-text {
            margin: 20px 0 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #00ccff;
            text-shadow: 
                0 0 10px #00ccff,
                0 0 20px #0066cc,
                0 0 40px #00ccff;
            animation: text-flicker 3s linear infinite;
        }

        .hologram-subtext {
            font-size: 18px;
            color: #90d0ff;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
            animation: fade-pulse 2s ease-in-out infinite;
            margin-top: 5px;
        }

        .hologram-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #00ccff;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ccff;
            animation: particle-float 3s linear infinite;
        }

        .particle:nth-child(1) { top: 20%; left: 30%; animation-delay: 0s; }
        .particle:nth-child(2) { top: 60%; left: 70%; animation-delay: 0.5s; }
        .particle:nth-child(3) { top: 80%; left: 40%; animation-delay: 1s; }
        .particle:nth-child(4) { top: 30%; left: 80%; animation-delay: 1.5s; }
        .particle:nth-child(5) { top: 70%; left: 20%; animation-delay: 2s; }

        @keyframes hologram-gradient {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        @keyframes hologram-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes scan-move {
            0% { transform: translateY(-60px); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(60px); opacity: 0; }
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.2); }
        }

        @keyframes text-flicker {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px #00ccff, 0 0 20px #0066cc, 0 0 40px #00ccff; }
            33% { opacity: 0.9; text-shadow: 0 0 15px #00ccff, 0 0 30px #0066cc, 0 0 60px #00ccff; }
            66% { opacity: 1; text-shadow: 0 0 8px #00ccff, 0 0 15px #0066cc, 0 0 30px #00ccff; }
        }

        @keyframes fade-pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        @keyframes particle-float {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(0); opacity: 0; }
        }

        /* 離開確認視窗 */
        .confirm-dialog {
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            z-index: 10000; display: flex; align-items: center; justify-content: center;
        }
        .confirm-content { background: #1a1a1a; border: 2px solid #ffd700; border-radius: 20px; padding: 20px; max-width: 280px; width: 90%; text-align: center; }
        .confirm-buttons { display: flex; gap: 12px; margin-top: 1.2rem; }
        .confirm-btn { flex:1; padding: 8px; border-radius: 10px; font-weight: 700; cursor: pointer; border: none; }

        /* 彈跳警示 */
        .alert-popup {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff0000, #990000);
            color: white;
            padding: 16px 20px;
            border-radius: 16px;
            border: 2px solid #ffd700;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.8);
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 15px;
            min-width: 280px;
            max-width: 90%;
            animation: slideDown 0.3s ease;
            cursor: grab;
            touch-action: none;
            transition: transform 0.1s ease;
            user-select: none;
            will-change: transform, opacity;
        }
        
        .alert-popup.swiping {
            transition: none;
            cursor: grabbing;
        }
        
        @keyframes slideDown {
            from { top: -100px; opacity: 0; }
            to { top: 20px; opacity: 1; }
        }

        .hidden { display: none !important; }
        .section-header { display: flex; justify-content: space-between; margin-bottom: 0.8rem; border-bottom: 1px solid #1e4b7c; padding-bottom: 0.3rem; }
        .section-title { font-size: 1rem; color: #80e4ff; }
        .section-count { font-size: 0.8rem; background: #1d405e; padding: 0.2rem 0.8rem; border-radius: 30px; }
        
        /* 導航小紅點 */
        .nav-badge {
            position: absolute;
            top: 0px;
            right: 0px;
            width: 10px;
            height: 10px;
            background-color: #ff3b3b;
            border-radius: 50%;
            border: 2px solid #001a33;
            box-shadow: 0 0 8px #ff0000;
            display: none;
            z-index: 25;
        }
        .nav-item.current-page .nav-badge {
            border-color: #0066cc;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-blue-950 text-white">
<div class="max-w-md mx-auto tech-gradient min-h-screen flex flex-col">

    <!-- 頂部導航 -->
    <header class="px-4 py-3 bg-dark-200/90 tech-border">
        <div class="flex items-center justify-between">
            <a href="index.html" class="logo">
                <div class="logo-icon"><div class="logo-icon-inner">TP</div></div>
                <div class="logo-text"><div class="logo-main">T-PACHIN</div><div class="logo-sub">CYBER PACHINKO SYSTEM</div></div>
            </a>
            <div class="flex flex-col items-end">
                <a href="about.html" class="text-xs text-white hover:text-yellow-400 transition-colors nickname-display">夫人會生氣</a>
                <div class="font-bold text-lg text-yellow-400 points-display">2,300</div>
            </div>
        </div>
    </header>

    <!-- 公告按鈕框 -->
    <div class="px-4 mt-2">
        <div class="announcement-combo">
            <a href="news.html" class="combo-announce-btn"><i class="fa fa-bullhorn"></i> 公告</a>
            <div class="combo-marquee"><marquee scrollamount="5">◈ 春季人氣機台大賞 ◈ 甲賀忍法帖系列熱賣 ◈ 代幣優惠實施中 ◈</marquee></div>
        </div>
    </div>

    <!-- 分類標籤 (三個) - 我的最愛 改成 我的收藏 -->
    <div class="px-4 py-4">
        <div class="category-tabs-container">
            <button class="category-tab active" data-tab="favorite"><i class="fa fa-heart text-pink-400"></i>我的收藏</button>
            <button class="category-tab" data-tab="reserve"><i class="fa fa-clock-o text-yellow-400"></i>保留中</button>
            <button class="category-tab" data-tab="played"><i class="fa fa-history text-blue-400"></i>玩過</button>
        </div>
    </div>

    <!-- 主要內容 -->
    <main class="flex-1 px-4 overflow-y-auto main-content pb-4">
        <!-- 我的收藏區塊 (原我的最愛) -->
        <div id="favorite-section" class="category-section">
            <div class="section-header">
                <h2 class="section-title"><i class="fa fa-heart text-pink-400"></i> 我的收藏</h2>
                <span class="section-count" id="favoriteCount">0 台</span>
            </div>
            <div id="favoriteContainer"></div>
            <div id="noFavoriteMsg" class="text-center py-12 text-gray-400 hidden"><i class="fa fa-heart-o text-5xl mb-3"></i><p>尚未收藏任何機台</p></div>
        </div>

        <!-- 保留中區塊 -->
        <div id="reserve-section" class="category-section hidden">
            <div class="section-header">
                <h2 class="section-title"><i class="fa fa-clock-o text-yellow-400"></i> 保留中機台</h2>
                <span class="section-count" id="reserveCount">0 台</span>
            </div>
            <div id="reserveContainer"></div>
            <div id="noReserveMsg" class="text-center py-12 text-gray-400"><i class="fa fa-clock-o text-5xl mb-3"></i><p>目前沒有保留中機台</p></div>
        </div>

        <!-- 玩過區塊 -->
        <div id="played-section" class="category-section hidden">
            <div class="section-header">
                <h2 class="section-title"><i class="fa fa-history text-blue-400"></i> 玩過機台</h2>
                <span class="section-count" id="playedCount">0 台</span>
            </div>
            <div id="playedContainer"></div>
            <div id="noPlayedMsg" class="text-center py-12 text-gray-400"><i class="fa fa-history text-5xl mb-3"></i><p>還沒有玩過機台</p></div>
        </div>
    </main>

    <!-- 炫光全像投影 Loading 動畫容器 -->
    <div class="hologram-loading" id="hologramLoading">
        <div class="hologram-content">
            <div class="hologram-circle">
                <div class="hologram-inner-circle"></div>
                <div class="hologram-scan-line"></div>
                <div class="hologram-scan-line delay"></div>
                <div class="hologram-glow"></div>
            </div>
            <div class="hologram-text">LOADING</div>
            <div class="hologram-subtext">載入中......</div>
            <div class="hologram-particles">
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
            </div>
        </div>
    </div>

    <!-- 彈跳警示/確認容器 -->
    <div id="alertContainer"></div>
    <div id="confirmContainer"></div>

    <!-- 底部導航 - 修正後的版本 -->
    <nav class="bottom-nav mx-auto">
        <div class="flex justify-between items-center">
            <a href="index.html" class="nav-item" id="nav-home">
                <i class="fa fa-home text-xl"></i>
                <span class="text-xs mt-1">首頁</span>
            </a>
            <a href="machines.html" class="nav-item current-page" id="nav-game">
                <i class="fa fa-gamepad text-xl"></i>
                <span class="text-xs mt-1">機台</span>
            </a>
            <a href="news.html" class="nav-item" id="nav-bell">
                <i class="fa fa-bell text-xl"></i>
                <span class="text-xs mt-1">公告</span>
                <span class="nav-badge" id="newsBadge"></span>
            </a>
            <a href="about.html" class="nav-item" id="nav-user">
                <i class="fa fa-user text-xl"></i>
                <span class="text-xs mt-1">我的</span>
            </a>
        </div>
    </nav>
</div>

<script>
    (function() {
        // ==================== Loading 動畫控制 ====================
        const hologramLoading = document.getElementById('hologramLoading');

        function showHologramLoading() {
            hologramLoading.classList.add('show');
        }

        function hideHologramLoading() {
            hologramLoading.classList.remove('show');
        }

        // ==================== 點數同步 ====================
        const POINTS_STORAGE_KEY = 'tPachin_userPoints';
        let points = 2300;

        function loadPoints() {
            const storedPoints = localStorage.getItem(POINTS_STORAGE_KEY);
            if (storedPoints !== null) {
                points = parseInt(storedPoints, 10);
                if (isNaN(points)) points = 2300;
            } else {
                points = 2300;
                localStorage.setItem(POINTS_STORAGE_KEY, points);
            }
            updatePointsDisplay();
        }

        function savePoints() {
            localStorage.setItem(POINTS_STORAGE_KEY, points);
        }

        function updatePointsDisplay() {
            const pointsElement = document.querySelector('.points-display');
            if (pointsElement) {
                pointsElement.textContent = points.toLocaleString();
            }
            
            // 同步更新暱稱（如果有需要）
            const nicknameElement = document.querySelector('.nickname-display');
            if (nicknameElement && window.T_PACHIN_STORAGE) {
                const userData = window.T_PACHIN_STORAGE.getUserData();
                nicknameElement.textContent = userData.nickname;
            }
        }

        // 監聽其他分頁的點數變更
        window.addEventListener('storage', function(e) {
            if (e.key === POINTS_STORAGE_KEY) {
                const newPoints = parseInt(e.newValue, 10);
                if (!isNaN(newPoints)) {
                    points = newPoints;
                    updatePointsDisplay();
                }
            }
        });

        // 監聽自訂事件（來自 shared.js）
        window.addEventListener('t-pachin:user-updated', function(e) {
            if (e.detail && e.detail.points !== undefined) {
                points = e.detail.points;
                updatePointsDisplay();
            }
        });

        // 初始化點數
        loadPoints();

        // ==================== 資料定義 ====================
        const machineDatabase = [
            { id: 1, name: '甲賀忍法帖', sub: '弐', ratio: '每枚2', bb: 2, rb: 2, curr: 284, total: 2800 },
            { id: 2, name: '超級奇蹟小丑', sub: '', ratio: '每枚1', bb: 3, rb: 5, curr: 512, total: 4100 },
            { id: 3, name: '冥王黑帝斯', sub: '-No more Dog', ratio: '每枚2', bb: 2, rb: 2, curr: 284, total: 2800 },
            { id: 4, name: '北斗神拳', sub: '修羅之國', ratio: '每枚3', bb: 4, rb: 3, curr: 678, total: 5200 },
            { id: 5, name: '海物語', sub: '沖繩版', ratio: '每枚1', bb: 5, rb: 4, curr: 445, total: 3800 }
        ];

        // 我的收藏 (原我的最愛)
        let favoriteMachines = [
            { ...machineDatabase[0] },
            { ...machineDatabase[2] }
        ];

        // 保留中機台
        let reserveMachines = [
            { 
                id: 101, name: '冥王黑帝斯', sub: '-No more Dog', ratio: '每枚2', 
                reserveTime: '00:10:59', expiresAt: Date.now() + 9 * 60 * 1000,
                bb: 2, rb: 2, curr: 284, total: 2800 
            },
            { 
                id: 102, name: '甲賀忍法帖', sub: '極', ratio: '每枚2', 
                reserveTime: '15:30:00', expiresAt: Date.now() + 25 * 60 * 1000,
                bb: 3, rb: 5, curr: 512, total: 4100 
            }
        ];

        // 玩過機台
        let playedMachines = [
            { 
                id: 201, name: '北斗神拳', sub: '修羅之國', ratio: '每枚3', 
                playedDate: '2024-02-15', playCount: 3,
                bb: 4, rb: 3, curr: 678, total: 5200 
            },
            { 
                id: 202, name: '海物語', sub: '沖繩版', ratio: '每枚1', 
                playedDate: '2024-02-14', playCount: 5,
                bb: 5, rb: 4, curr: 445, total: 3800 
            },
            { 
                id: 203, name: '超級奇蹟小丑', sub: '', ratio: '每枚1', 
                playedDate: '2024-02-13', playCount: 2,
                bb: 3, rb: 5, curr: 512, total: 4100 
            }
        ];

        const singleValues = [1003, 491, 271, 786, 75, 47, 582, 349];

        // ==================== 工具函數 ====================
        function generateVerticalCards() {
            let cards = '';
            
            for (let i = 0; i < 8; i++) {
                const fillCount = Math.floor(Math.random() * 5) + 1;
                
                let bars = [];
                for (let s = 0; s < 5; s++) {
                    if (s < fillCount) {
                        const isRed = Math.random() > 0.5;
                        bars.push(`<div class="card-bar-segment ${isRed ? 'filled-red' : 'filled-green'}"></div>`);
                    } else {
                        bars.push(`<div class="card-bar-segment"></div>`);
                    }
                }
                
                bars.reverse();
                
                cards += `
                    <div class="vertical-card">
                        <div class="card-number">${i + 1}</div>
                        <div class="card-bars">
                            ${bars.join('')}
                        </div>
                        <div class="card-single">單發</div>
                        <div class="card-value">${singleValues[i]}</div>
                    </div>
                `;
            }
            
            return cards;
        }

        function createCardHTML(machine, type = 'favorite') {
            const isFav = favoriteMachines.some(f => f.id === machine.id);
            
            let topRow = '';
            if (type === 'reserve') {
                topRow = `
                    <div class="page1-reserve-row">
                        <span class="reserve-text">保留中</span>
                        <span class="time-big">${machine.reserveTime || '00:10:59'}</span>
                    </div>
                `;
            } else if (type === 'played') {
                topRow = `
                    <div class="page1-played-row">
                        <span class="played-text">玩過 ${machine.playCount || 1}次</span>
                        <span class="played-date">${machine.playedDate || '2024-02-15'}</span>
                    </div>
                `;
            }

            return `
            <div class="flip-card ${type}-card" data-machine-id="${machine.id}" data-page="1">
                <!-- 第一頁：格子排版 -->
                <div class="page page-1">
                    <div class="page1-row1">
                        <div class="model-name">
                            <strong>NO.${machine.id}</strong> ${machine.name} 
                            <span style="color:#aac9ff;">${machine.sub || ''}</span>
                        </div>
                        <span class="ratio-mini">${machine.ratio}</span>
                    </div>
                    ${topRow}
                    
                    <div class="stats-grid">
                        <div class="stat-cell">
                            <div class="stat-label">BB</div>
                            <div class="stat-number bb-number">${machine.bb}</div>
                        </div>
                        <div class="stat-cell">
                            <div class="stat-label">RB</div>
                            <div class="stat-number rb-number">${machine.rb}</div>
                        </div>
                        <div class="stat-cell">
                            <div class="stat-label">當前</div>
                            <div class="stat-number curr-number">${machine.curr}</div>
                        </div>
                        <div class="stat-cell">
                            <div class="stat-label">總回</div>
                            <div class="stat-number total-number">${machine.total}</div>
                        </div>
                    </div>
                </div>
                
                <!-- 第二頁：獨立垂直卡片 + 由下往上排列 -->
                <div class="page page-2 hidden">
                    <div class="vertical-cards-container">
                        ${generateVerticalCards()}
                    </div>
                </div>
                
                <div class="page-indicator">
                    <span class="dot active"></span>
                    <span class="dot"></span>
                </div>
                
                <div class="card-actions">
                    <button class="enter-btn" onclick="window.handleEnter('${machine.name}')">進入</button>
                    ${type === 'reserve' ? `<button class="leave-btn" onclick="window.showLeaveConfirm(${machine.id}, '${machine.name}')">離開</button>` : ''}
                    <button class="favorite-btn ${isFav ? 'active' : 'inactive'}" onclick="window.toggleFavorite(${machine.id})">
                        <i class="fa ${isFav ? 'fa-heart' : 'fa-heart-o'}"></i>
                    </button>
                </div>
            </div>
            `;
        }

        // ==================== 渲染函數 ====================
        function renderFavoriteList() {
            const container = document.getElementById('favoriteContainer');
            const noMsg = document.getElementById('noFavoriteMsg');
            const countSpan = document.getElementById('favoriteCount');
            
            if (favoriteMachines.length === 0) {
                container.innerHTML = '';
                noMsg.classList.remove('hidden');
                countSpan.textContent = '0 台';
                return;
            }
            
            noMsg.classList.add('hidden');
            countSpan.textContent = favoriteMachines.length + ' 台';
            
            let html = '';
            favoriteMachines.forEach(machine => {
                html += createCardHTML(machine, 'favorite');
            });
            container.innerHTML = html;
            bindFlipEvents();
        }

        function renderReserveList() {
            const container = document.getElementById('reserveContainer');
            const noMsg = document.getElementById('noReserveMsg');
            const countSpan = document.getElementById('reserveCount');
            
            if (reserveMachines.length === 0) {
                container.innerHTML = '';
                noMsg.classList.remove('hidden');
                countSpan.textContent = '0 台';
                return;
            }
            
            noMsg.classList.add('hidden');
            countSpan.textContent = reserveMachines.length + ' 台';
            
            let html = '';
            reserveMachines.forEach(machine => {
                html += createCardHTML(machine, 'reserve');
            });
            container.innerHTML = html;
            bindFlipEvents();
        }

        function renderPlayedList() {
            const container = document.getElementById('playedContainer');
            const noMsg = document.getElementById('noPlayedMsg');
            const countSpan = document.getElementById('playedCount');
            
            if (playedMachines.length === 0) {
                container.innerHTML = '';
                noMsg.classList.remove('hidden');
                countSpan.textContent = '0 台';
                return;
            }
            
            noMsg.classList.add('hidden');
            countSpan.textContent = playedMachines.length + ' 台';
            
            let html = '';
            playedMachines.forEach(machine => {
                html += createCardHTML(machine, 'played');
            });
            container.innerHTML = html;
            bindFlipEvents();
        }

        // ==================== 頁面切換 ====================
        function bindFlipEvents() {
            document.querySelectorAll('.flip-card').forEach(card => {
                card.removeEventListener('click', handleCardClick);
                card.addEventListener('click', handleCardClick);
            });
        }

        function handleCardClick(event) {
            if (event.target.closest('button')) return;
            
            const card = event.currentTarget;
            const page1 = card.querySelector('.page-1');
            const page2 = card.querySelector('.page-2');
            const dots = card.querySelectorAll('.dot');
            
            if (!page1 || !page2) return;
            
            if (!page1.classList.contains('hidden')) {
                page1.classList.add('hidden');
                page2.classList.remove('hidden');
                dots[0].classList.remove('active');
                dots[1].classList.add('active');
            } else {
                page2.classList.add('hidden');
                page1.classList.remove('hidden');
                dots[1].classList.remove('active');
                dots[0].classList.add('active');
            }
        }

        // ==================== 滑動關閉警示 ====================
        function setupSwipeToDismiss(alertElement) {
            let startY = 0;
            let currentY = 0;
            let isSwiping = false;
            
            function handleStart(clientY) {
                startY = clientY;
                isSwiping = true;
                alertElement.classList.add('swiping');
                alertElement.style.transition = 'none';
            }
            
            function handleMove(clientY) {
                if (!isSwiping) return;
                currentY = clientY;
                const diffY = currentY - startY;
                
                if (diffY < 0) {
                    const translateY = Math.max(diffY, -200);
                    alertElement.style.transform = `translateX(-50%) translateY(${translateY}px)`;
                    alertElement.style.opacity = 1 + (translateY / 200);
                }
            }
            
            function handleEnd() {
                if (!isSwiping) return;
                isSwiping = false;
                alertElement.classList.remove('swiping');
                
                const diffY = currentY - startY;
                
                if (diffY < -50) {
                    alertElement.style.transition = 'all 0.3s ease';
                    alertElement.style.transform = `translateX(-50%) translateY(-200px)`;
                    alertElement.style.opacity = '0';
                    setTimeout(() => alertElement.remove(), 300);
                } else {
                    alertElement.style.transition = 'all 0.3s ease';
                    alertElement.style.transform = 'translateX(-50%) translateY(0)';
                    alertElement.style.opacity = '1';
                }
                
                window.removeEventListener('mousemove', mouseMoveHandler);
                window.removeEventListener('mouseup', mouseUpHandler);
                window.removeEventListener('touchmove', touchMoveHandler);
                window.removeEventListener('touchend', touchEndHandler);
            }
            
            const touchStartHandler = (e) => {
                e.preventDefault();
                handleStart(e.touches[0].clientY);
            };
            
            const touchMoveHandler = (e) => {
                e.preventDefault();
                handleMove(e.touches[0].clientY);
            };
            
            const touchEndHandler = (e) => {
                e.preventDefault();
                handleEnd();
            };
            
            const mouseDownHandler = (e) => {
                e.preventDefault();
                handleStart(e.clientY);
                window.addEventListener('mousemove', mouseMoveHandler);
                window.addEventListener('mouseup', mouseUpHandler);
            };
            
            const mouseMoveHandler = (e) => {
                e.preventDefault();
                handleMove(e.clientY);
            };
            
            const mouseUpHandler = (e) => {
                e.preventDefault();
                handleEnd();
            };
            
            alertElement.addEventListener('touchstart', touchStartHandler, { passive: false });
            alertElement.addEventListener('touchmove', touchMoveHandler, { passive: false });
            alertElement.addEventListener('touchend', touchEndHandler, { passive: false });
            alertElement.addEventListener('mousedown', mouseDownHandler);
        }

        // ==================== 全域函數 ====================
        window.handleEnter = function(name) {
            showHologramLoading();
            
            setTimeout(() => {
                hideHologramLoading();
                alert(`🎮 進入遊戲 - ${name}\n\n此為演示功能，實際遊玩請前往遊戲頁面。`);
            }, 2000);
        };

        window.showLeaveConfirm = function(id, name) {
            const container = document.getElementById('confirmContainer');
            if (document.getElementById(`confirm-${id}`)) return;
            
            const dialog = document.createElement('div');
            dialog.className = 'confirm-dialog';
            dialog.id = `confirm-${id}`;
            dialog.innerHTML = `
                <div class="confirm-content">
                    <h3 class="text-yellow-400 font-bold text-lg mb-2">離開保留</h3>
                    <p class="my-4 text-white">確定離開 <span class="text-blue-300 font-bold">${name}</span> 嗎？</p>
                    <div class="confirm-buttons">
                        <button class="confirm-btn cancel bg-gray-600 hover:bg-gray-700" onclick="closeLeaveConfirm(${id})">取消</button>
                        <button class="confirm-btn confirm bg-red-600 hover:bg-red-700" onclick="confirmLeave(${id})">確定離開</button>
                    </div>
                </div>
            `;
            container.appendChild(dialog);
        };

        window.closeLeaveConfirm = function(id) {
            const dialog = document.getElementById(`confirm-${id}`);
            if (dialog) dialog.remove();
        };

        window.confirmLeave = function(id) {
            reserveMachines = reserveMachines.filter(m => m.id !== id);
            renderReserveList();
            closeLeaveConfirm(id);
        };

        window.toggleFavorite = function(id) {
            let machine = machineDatabase.find(m => m.id === id);
            if (!machine) {
                machine = reserveMachines.find(m => m.id === id);
            }
            if (!machine) {
                machine = playedMachines.find(m => m.id === id);
            }
            if (!machine) return;
            
            const index = favoriteMachines.findIndex(f => f.id === id);
            if (index !== -1) {
                favoriteMachines.splice(index, 1);
            } else {
                favoriteMachines.push({ ...machine });
            }
            
            renderFavoriteList();
            renderReserveList();
            renderPlayedList();
        };

        // ==================== 標籤切換 ====================
        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                
                const target = this.dataset.tab;
                document.querySelectorAll('.category-section').forEach(s => s.classList.add('hidden'));
                document.getElementById(target + '-section').classList.remove('hidden');
            });
        });

        // ==================== 最後10分鐘警示（可滑動） ====================
        setInterval(() => {
            const now = Date.now();
            reserveMachines.forEach(machine => {
                if (machine.expiresAt && machine.expiresAt - now <= 600000 && machine.expiresAt > now) {
                    const alertContainer = document.getElementById('alertContainer');
                    if (document.querySelector(`.alert-popup[data-id="${machine.id}"]`)) return;
                    
                    const alert = document.createElement('div');
                    alert.className = 'alert-popup';
                    alert.setAttribute('data-id', machine.id);
                    alert.innerHTML = `
                        <div class="alert-icon"><i class="fa fa-exclamation-triangle"></i></div>
                        <div class="alert-content">
                            <div class="alert-title font-bold">⚠️ 即將到期</div>
                            <div class="alert-message">${machine.name} 剩餘 ${Math.floor((machine.expiresAt - now)/60000)}分鐘</div>
                        </div>
                    `;
                    alertContainer.appendChild(alert);
                    setupSwipeToDismiss(alert);
                    
                    setTimeout(() => {
                        if (alert.parentNode) alert.remove();
                    }, 10000);
                }
            });
        }, 10000);

        // ==================== 初始化 ====================
        renderFavoriteList();
        renderReserveList();
        renderPlayedList();
        
        // 初始化新聞小紅點（示範用）
        const newsBadge = document.getElementById('newsBadge');
        if (newsBadge) {
            newsBadge.style.display = 'block';
        }
    })();
</script>

<script src="shared.js"></script>
