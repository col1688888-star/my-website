    <div class="sub-confirm-modal" id="subConfirmModal"><div class="sub-confirm-content"><div class="sub-confirm-header"><h3 id="confirmMachineName">GOGO 小丑</h3><p id="confirmSubName">1號機</p></div><div class="sub-confirm-detail"><div class="detail-row"><span class="detail-label"><i class="fa fa-ticket"></i> 每枚代幣</span><span class="detail-value" id="confirmRatio">2.5</span></div><div class="detail-row"><span class="detail-label"><i class="fa fa-database"></i> 目前點數</span><span class="detail-value" id="confirmPoints">6,600</span></div></div><div class="sub-confirm-input-group"><label><i class="fa fa-arrow-down"></i> 使用代幣數量 <span style="color:#ffaa66;">(最低 100)</span></label><input type="number" id="confirmTokenInput" min="100" step="1" placeholder="請輸入數量" value="100"><div class="sub-confirm-balance" id="confirmTokenRemain"><i class="fa fa-credit-card"></i> 剩餘點數: 6,600</div></div><div class="sub-confirm-actions"><button class="sub-confirm-btn secondary" id="confirmCancel">取消</button><button class="sub-confirm-btn primary" id="confirmOk">確認進入</button></div></div></div>

    <div class="hologram-loading" id="hologramLoading"><div class="hologram-content"><video id="mascotVideo" class="loading-video" autoplay muted loop playsinline src="https://video.wixstatic.com/video/d5e540_d63f842135e8416f891842373bc0f582/720p/mp4/file.mp4"></video><div class="loading-text" id="loadingMachineTitle">LOADING</div><div class="progress-bar"><div class="progress-fill"></div></div></div></div>

    <script>
        (function() {
            const platforms = ['BBIN', 'TZ', '搖錢樹', 'FDY', '富大爺', '富游', 'LIVE7', '包你發'];
            
            function generateAllTransactions() {
                const transactions = [];
                const now = new Date();
                const types = [
                    { type: 'platform_in', name: '平台轉入', icon: 'fa-download', colors: 'card-platform_in', isPositive: true },
                    { type: 'platform_out', name: '平台轉出', icon: 'fa-upload', colors: 'card-platform_out', isPositive: false },
                    { type: 'token_in', name: '代幣帶入', icon: 'fa-arrow-down', colors: 'card-token_in', isPositive: true },
                    { type: 'token_out', name: '代幣帶出', icon: 'fa-arrow-up', colors: 'card-token_out', isPositive: false },
                    { type: 'bonus', name: '活動贈分', icon: 'fa-gift', colors: 'card-bonus', isPositive: true },
                    { type: 'manual_add', name: '人工上分', icon: 'fa-user-plus', colors: 'card-manual_add', isPositive: true },
                    { type: 'manual_sub', name: '人工下分', icon: 'fa-user-minus', colors: 'card-manual_sub', isPositive: false },
                    { type: 'shop', name: '購買道具', icon: 'fa-shopping-cart', colors: 'card-shop', isPositive: false }
                ];
                
                types.forEach((t) => {
                    const count = Math.floor(Math.random() * 3) + 3;
                    for (let i = 0; i < count; i++) {
                        const date = new Date(now);
                        const daysAgo = Math.floor(Math.random() * 30);
                        date.setDate(now.getDate() - daysAgo);
                        date.setHours(10 + Math.floor(Math.random() * 12), Math.floor(Math.random() * 60), Math.floor(Math.random() * 60));
                        
                        let amount, detailText;
                        if (t.type === 'platform_in' || t.type === 'platform_out') {
                            const platform = platforms[Math.floor(Math.random() * platforms.length)];
                            amount = Math.floor(Math.random() * 5000) + 500;
                            detailText = platform;
                        } else if (t.type === 'token_in' || t.type === 'token_out') {
                            amount = Math.floor(Math.random() * 3000) + 100;
                            detailText = `代幣 ${Math.floor(amount / 2.5)} 枚`;
                        } else if (t.type === 'bonus') {
                            amount = Math.floor(Math.random() * 1000) + 50;
                            detailText = ['週年慶', '每日簽到', '推薦獎勵', 'VIP禮包'][Math.floor(Math.random() * 4)];
                        } else if (t.type === 'manual_add' || t.type === 'manual_sub') {
                            amount = Math.floor(Math.random() * 2000) + 100;
                            detailText = `客服 ${['小美', '小華', '阿明', '小芳'][Math.floor(Math.random() * 4)]}`;
                        } else {
                            amount = Math.floor(Math.random() * 500) + 50;
                            const items = ['幸運符', '經驗加倍卡', '神秘寶箱', '頭像框', '特效道具'];
                            detailText = items[Math.floor(Math.random() * items.length)];
                        }
                        
                        transactions.push({
                            id: `${t.type}_${i}_${Date.now()}_${Math.random()}`,
                            type: t.type,
                            typeName: t.name,
                            icon: t.icon,
                            cardClass: t.colors,
                            amount: t.isPositive ? amount : -amount,
                            date: date,
                            orderId: `${t.type.substring(0,2).toUpperCase()}${String(i+1).padStart(4,'0')}${Math.floor(Math.random() * 100)}`,
                            detail: detailText,
                            status: 'success'
                        });
                    }
                });
                return transactions.sort((a, b) => b.date - a.date);
            }
            
            let allTransactions = generateAllTransactions();
            
            function renderTransactionCards() {
                const container = document.getElementById('transactionContainer');
                if (!container) return;
                let html = '';
                allTransactions.forEach(trans => {
                    const isPositive = trans.amount > 0;
                    const amountSign = isPositive ? '+' : '';
                    const amountClass = isPositive ? 'positive' : 'negative';
                    const dateStr = trans.date.toLocaleString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
                    html += `<div class="transaction-card ${trans.cardClass}" onclick="openTransactionDetail('${trans.id}', '${trans.typeName}', ${Math.abs(trans.amount)}, '${trans.orderId}', '${dateStr}', '${trans.detail}', ${isPositive})"><div class="transaction-card-header"><div class="transaction-name"><i class="fa ${trans.icon}"></i> ${trans.typeName}</div><span class="transaction-type" style="background: ${isPositive ? '#2a6e8a' : '#8a5a2a'}; color: white;">${isPositive ? '收入' : '支出'}</span></div><div class="transaction-amount ${amountClass}">${amountSign}${Math.abs(trans.amount)} 點</div><div class="transaction-detail"><span><i class="fa fa-calendar"></i> ${dateStr}</span><span><i class="fa fa-hashtag"></i> ${trans.orderId}</span><span><i class="fa fa-info-circle"></i> ${trans.detail}</span></div></div>`;
                });
                container.innerHTML = html || '<div class="text-center text-gray-400 py-4">暫無交易記錄</div>';
            }
            
            window.openTransactionDetail = function(id, typeName, amount, orderId, dateStr, detail, isPositive) {
                const amountClass = isPositive ? 'positive' : 'negative';
                const amountSign = isPositive ? '+' : '';
                const content = `<div class="row"><span class="label">訂單編號</span><span class="value">${orderId}</span></div><div class="row"><span class="label">交易類型</span><span class="value">${typeName}</span></div><div class="row"><span class="label">交易金額</span><span class="value ${amountClass}">${amountSign}${amount} 點</span></div><div class="row"><span class="label">詳細資訊</span><span class="value">${detail}</span></div><div class="row"><span class="label">交易時間</span><span class="value">${dateStr}</span></div><div class="row"><span class="label">交易狀態</span><span class="value" style="color: #88ff88;">成功</span></div>`;
                document.getElementById('betDetailTitle').textContent = `${typeName}明細`;
                document.getElementById('betDetailContent').innerHTML = content;
                document.getElementById('betDetailModal').classList.add('active');
            };
            
            const POINTS_KEY = 't_pachin_user_points';
            let userPoints = 6600;
            function updatePointsDisplay() {
                const userPointsEl = document.getElementById('userPoints');
                if (userPointsEl) userPointsEl.textContent = userPoints.toLocaleString();
                const confirmPoints = document.getElementById('confirmPoints');
                if (confirmPoints) confirmPoints.textContent = userPoints.toLocaleString();
            }
            try { const stored = localStorage.getItem(POINTS_KEY); if (stored !== null) { userPoints = parseInt(stored, 10); if (isNaN(userPoints)) userPoints = 6600; } } catch(e) { userPoints = 6600; }
            updatePointsDisplay();
            
            let favoriteMachines = [{ id: 1, name: 'GOGO 小丑', number: 'J001', image: 'https://i.pinimg.com/736x/b1/f1/ec/b1f1ec3a191e62e3d0e300ce79c9b593.jpg', ratio: '2.5', vendor: 'Olympia', model: '6號機' },{ id: 2, name: '我是小丑-EX', number: 'J002', image: 'https://i.pinimg.com/736x/4a/2a/30/4a2a3089197d997984a7a75921faf2d9.jpg', ratio: '2.8', vendor: 'ELECO', model: '5號機' },{ id: 3, name: '快樂小丑 VII', number: 'J003', image: 'https://i.pinimg.com/736x/76/a7/ec/76a7eca59c0b7f7a8404e67e043841cb.jpg', ratio: '2.0', vendor: 'HEIWA', model: '6號機' }];
            let keepMachines = [{ id: 4, name: '新我是小丑-EX水晶版', number: 'J004', image: 'https://i.pinimg.com/736x/5a/d2/04/5ad204b86a09d1fc30374422fe0a4070.jpg', ratio: '3.0', vendor: 'Sammy', model: '6號機', endTime: new Date(Date.now() + 10 * 60 * 1000), coins: 250 },{ id: 5, name: '新我的小丑-EX紅金版', number: 'J005', image: 'https://i.pinimg.com/736x/63/46/aa/6346aaa01a8c68fbf4e8bdb5134cd7b1.jpg', ratio: '3.2', vendor: 'Daito', model: '6號機', endTime: new Date(Date.now() + 15 * 60 * 1000), coins: 380 }];

            function renderFavorites() { let html = ''; favoriteMachines.forEach(m => { html += `<div class="machine-card"><img src="${m.image}" alt="${m.name}"><div class="machine-info"><div class="machine-name">${m.name}</div><div class="machine-meta"><span>${m.number}</span><span>${m.model}</span><span>1:${m.ratio}</span><span>${m.vendor}</span></div></div><div class="machine-actions"><div class="play-btn" onclick="event.stopPropagation(); openFavoriteGame('${m.name}', '主機台', '${m.ratio}', ${m.id})"><i class="fa fa-play"></i> 進入</div><div class="unfavorite-btn" onclick="event.stopPropagation(); unfavoriteMachine(${m.id}, '${m.name}')"><i class="fa fa-heart"></i> 取消收藏</div></div></div>`; }); document.getElementById('favMachineItems').innerHTML = html || '<div class="text-gray-400 text-sm p-4 text-center">暫無收藏機台</div>'; document.getElementById('favCount').textContent = favoriteMachines.length; document.getElementById('favCountDisplay').textContent = favoriteMachines.length; }
            function renderKeep() { let html = ''; keepMachines.forEach(m => { const endDate = new Date(m.endTime); const endTimeStr = endDate.toLocaleString('zh-TW'); html += `<div class="machine-card"><img src="${m.image}" alt="${m.name}"><div class="machine-info"><div class="machine-name">${m.name}</div><div class="machine-meta"><span>${m.number}</span><span>${m.model}</span><span>1:${m.ratio}</span><span>${m.vendor}</span></div><div class="countdown-timer" data-endtime="${endDate.toISOString()}"><i class="fa fa-hourglass-half"></i> 計算中...</div><div style="font-size: 0.6rem; color: #aaa; margin-top: 2px;">結束於 ${endTimeStr}</div></div><div class="machine-actions"><div class="play-btn" onclick="event.stopPropagation(); enterReserveGame('${m.name}', '主機台', '${m.ratio}', ${m.id})"><i class="fa fa-play"></i> 進入</div><div class="leave-btn" onclick="event.stopPropagation(); leaveKeepMachine(${m.id}, '${m.name}', ${m.coins || 100})"><i class="fa fa-sign-out"></i> 離開</div></div></div>`; }); document.getElementById('keepMachineItems').innerHTML = html || '<div class="text-gray-400 text-sm p-4 text-center">暫無保留機台</div>'; document.getElementById('keepCount').textContent = keepMachines.length; document.getElementById('keepCountDisplay').textContent = keepMachines.length; updateCountdowns(); }
            function updateCountdowns() { document.querySelectorAll('.countdown-timer[data-endtime]').forEach(el => { const endTime = new Date(el.dataset.endtime).getTime(); const now = new Date().getTime(); const diff = endTime - now; if(diff <= 0) { el.innerHTML = '<i class="fa fa-hourglass-end"></i> 已到期'; el.classList.add('warning'); return; } const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)); const seconds = Math.floor((diff % (1000 * 60)) / 1000); el.innerHTML = `<i class="fa fa-hourglass-half"></i> 剩餘 ${minutes}分 ${seconds}秒`; if(minutes < 10) el.classList.add('warning'); else el.classList.remove('warning'); }); }
            window.openFavoriteGame = function(machineName, subName, ratio, machineId) { currentEnterData = { machineName, subName, ratio, machineId }; document.getElementById('confirmMachineName').textContent = machineName; document.getElementById('confirmSubName').textContent = subName; document.getElementById('confirmRatio').textContent = ratio; document.getElementById('confirmPoints').textContent = userPoints.toLocaleString(); document.getElementById('confirmTokenInput').value = 100; document.getElementById('confirmTokenRemain').innerHTML = `<i class="fa fa-credit-card"></i> 剩餘點數: ${(userPoints - 100).toLocaleString()}`; document.getElementById('subConfirmModal').classList.add('show'); };
            window.enterReserveGame = function(machineName, subName, ratio, machineId) { showHologramLoading(machineName, subName, ratio, machineId, 100); };
            window.unfavoriteMachine = function(id, name) { if (!confirm(`確定要取消收藏「${name}」嗎？`)) return; favoriteMachines = favoriteMachines.filter(m => m.id !== id); renderFavorites(); alert(`✅ 已取消收藏「${name}」`); };
            window.leaveKeepMachine = function(id, name, coinsEarned) { if (!confirm(`確定要離開保留的機台「${name}」嗎？\n\n離開後將獲得 ${coinsEarned} 點數`)) return; userPoints += coinsEarned; localStorage.setItem(POINTS_KEY, userPoints); updatePointsDisplay(); keepMachines = keepMachines.filter(m => m.id !== id); renderKeep(); alert(`✅ 已離開機台「${name}」，獲得 ${coinsEarned} 點數！`); };
            function showHologramLoading(machineName, subName, ratio, machineId, coins) { document.getElementById('loadingMachineTitle').textContent = `${machineName} ${subName} 每枚${ratio}`; document.getElementById('hologramLoading').classList.add('show'); localStorage.setItem('t_pachin_machine_info', JSON.stringify({ name: machineName, subName, ratio, machineId, coins })); setTimeout(() => { window.location.href = 'simulator.html'; }, 2500); }
            function confirmEnterGame() { if (!currentEnterData) return; let tokenUsed = parseInt(document.getElementById('confirmTokenInput').value) || 0; if (tokenUsed < 100) { alert('最低兌換數量為 100 代幣！'); return; } if (tokenUsed > userPoints) { alert('點數不足！'); return; } userPoints -= tokenUsed; localStorage.setItem(POINTS_KEY, userPoints); updatePointsDisplay(); document.getElementById('subConfirmModal').classList.remove('show'); showHologramLoading(currentEnterData.machineName, currentEnterData.subName, currentEnterData.ratio, currentEnterData.machineId, tokenUsed); }
            function closeSubConfirm() { document.getElementById('subConfirmModal').classList.remove('show'); currentEnterData = null; }
            document.getElementById('confirmCancel')?.addEventListener('click', closeSubConfirm); document.getElementById('confirmOk')?.addEventListener('click', confirmEnterGame); document.getElementById('confirmTokenInput')?.addEventListener('input', function() { let val = parseInt(this.value) || 0; if (val < 100) { this.value = 100; val = 100; } if (val > userPoints) { val = userPoints; this.value = userPoints; } document.getElementById('confirmTokenRemain').innerHTML = `<i class="fa fa-credit-card"></i> 剩餘點數: ${(userPoints - val).toLocaleString()}`; });
            document.getElementById('favMachinesBtn')?.addEventListener('click', () => { document.getElementById('favMachineList').classList.toggle('show'); document.getElementById('keepMachineList').classList.remove('show'); });
            document.getElementById('keepMachinesBtn')?.addEventListener('click', () => { document.getElementById('keepMachineList').classList.toggle('show'); document.getElementById('favMachineList').classList.remove('show'); updateCountdowns(); });
            document.getElementById('supportBtn')?.addEventListener('click', () => alert('📞 客服與幫助'));
            document.getElementById('vipBadge')?.addEventListener('click', () => document.getElementById('vipInfoPanel').classList.toggle('hidden'));
            document.getElementById('expText')?.addEventListener('click', () => document.getElementById('vipInfoPanel').classList.toggle('hidden'));
            document.getElementById('avatarContainer')?.addEventListener('click', () => { const avatars = ['https://i.pravatar.cc/150?img=7','https://i.pravatar.cc/150?img=5','https://i.pravatar.cc/150?img=9']; document.getElementById('avatarImage').src = avatars[Math.floor(Math.random() * avatars.length)]; alert('大頭照已更換'); });
            document.getElementById('displayNickname')?.addEventListener('click', () => { let name = prompt('修改暱稱', '郝可愛'); if(name) document.getElementById('displayNickname').textContent = name; });
            document.getElementById('headerPoints')?.addEventListener('click', () => alert(`💰 目前點數：${userPoints.toLocaleString()}`));
            
            let currentEnterData = null;
            let betSortOrder = 'desc';
            let searchTerm = '';
            let dateStart = new Date('2025-02-01');
            let dateEnd = new Date('2025-03-31');
            dateEnd.setHours(23, 59, 59);
            
            function generateSessions() {
                const sessions = []; let spinCounter = 1;
                const machines = [{ name: 'GOGO 小丑', number: 'J001' },{ name: '我是小丑-EX', number: 'J002' },{ name: '快樂小丑 VII', number: 'J003' },{ name: '新我是小丑-EX水晶版', number: 'J004' },{ name: '新我的小丑-EX紅金版', number: 'J005' }];
                machines.forEach((machine, idx) => {
                    const baseDate = new Date(2025, 1, 19 + idx, 20, 30 + idx * 10);
                    const session = { id: `session-${idx + 1}`, machineName: machine.name, machineNumber: machine.number, bringInTime: new Date(baseDate), bringInAmount: 300 + idx * 50, bringOutTime: new Date(baseDate.getTime() + 45 * 60000), bringOutAmount: 350 + idx * 60, details: [], stats: { totalSpins: 0, totalBet: 0, totalWin: 0, bbCount: 0 } };
                    session.details.push({ date: new Date(session.bringInTime), type: 'BRING_IN', bet: 0, win: session.bringInAmount, total: session.bringInAmount, betId: `INIT${idx+1}` });
                    let currentTotal = session.bringInAmount, currentTime = new Date(session.bringInTime);
                    for (let i = 0; i < 12; i++) { currentTime = new Date(currentTime.getTime() + (1 + Math.random() * 2) * 60000); const bet = 3; const win = Math.random() < 0.3 ? bet * (1 + Math.floor(Math.random() * 2)) : 0; currentTotal = currentTotal - bet + win; session.details.push({ date: new Date(currentTime), type: 'SPIN', bet: bet, win: win, total: currentTotal, betId: `SPIN${spinCounter++}` }); session.stats.totalSpins++; session.stats.totalBet += bet; session.stats.totalWin += win; }
                    for (let i = 0; i < 18; i++) { currentTime = new Date(currentTime.getTime() + (0.5 + Math.random()) * 60000); const bet = 2; const win = 8 + Math.floor(Math.random() * 8); currentTotal = currentTotal - bet + win; session.details.push({ date: new Date(currentTime), type: 'BB', bet: bet, win: win, total: currentTotal, betId: `BB${spinCounter++}`, videoType: 'BB' }); session.stats.totalSpins++; session.stats.totalBet += bet; session.stats.totalWin += win; session.stats.bbCount++; }
                    session.bringOutAmount = currentTotal; session.details.push({ date: new Date(session.bringOutTime), type: 'BRING_OUT', bet: session.bringOutAmount, win: 0, total: 0, betId: `OUT${idx+1}` }); session.netProfit = session.bringOutAmount - session.bringInAmount; sessions.push(session);
                });
                return sessions;
            }
            
            let sessions = generateSessions();
            let currentSession = null;
            
            function filterSessions() {
                let filtered = sessions.filter(s => { const sessionDate = new Date(s.bringInTime); return sessionDate >= dateStart && sessionDate <= dateEnd; });
                if (searchTerm) { const term = searchTerm.toLowerCase(); filtered = filtered.filter(s => s.machineName.toLowerCase().includes(term) || s.machineNumber.toLowerCase().includes(term)); }
                return filtered;
            }
            
            function formatDateTime(date) { return date.toLocaleString('zh-TW'); }
            function formatDate(date) { return date.toLocaleDateString('zh-TW'); }
            function formatTime(date) { return date.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' }); }
            
            function calculateTotals() {
                const filtered = filterSessions();
                let totalBet = 0, totalWin = 0;
                filtered.forEach(s => { totalBet += s.stats.totalBet; totalWin += s.stats.totalWin; });
                document.getElementById('totalBet').textContent = totalBet;
                document.getElementById('totalWin').textContent = totalWin;
                const net = totalWin - totalBet;
                document.getElementById('totalNet').textContent = net >= 0 ? `+${net}` : net;
            }
            
            function renderSessions() {
                const filtered = filterSessions();
                let html = '';
                filtered.forEach((session, idx) => {
                    html += `<div class="main-row" onclick="openBetModal(${idx})"><div><div class="machine-title"><span class="name">${session.machineName}</span><span class="number">#${session.machineNumber}</span></div><div class="date-range">${formatDate(session.bringInTime)} ~ ${formatDate(session.bringOutTime)}  ${formatTime(session.bringInTime)}~${formatTime(session.bringOutTime)}</div><div class="amount-info"><span class="bring-in">帶入 ${session.bringInAmount}</span><span class="text-gray-400">→</span><span class="bring-out">帶出 ${session.bringOutAmount}</span><span class="text-gray-400">|</span><span class="net-profit ${session.netProfit >= 0 ? 'positive' : 'negative'}">淨利 ${session.netProfit >= 0 ? '+' : ''}${session.netProfit}</span></div></div></div>`;
                });
                document.getElementById('sessionsContainer').innerHTML = html || '<div class="text-center text-gray-400 py-8">沒有注單記錄</div>';
                calculateTotals();
            }
            
            window.openBetModal = function(idx) {
                currentSession = sessions[idx];
                document.getElementById('betModalTitle').textContent = `${currentSession.machineName} #${currentSession.machineNumber}`;
                const winRate = currentSession.stats.totalSpins > 0 ? Math.round((currentSession.stats.totalWin / currentSession.stats.totalBet) * 100) : 0;
                document.getElementById('betStats').innerHTML = `<div class="stat-card"><i class="fa fa-refresh"></i><span>總轉數</span><span>${currentSession.stats.totalSpins}</span></div><div class="stat-card"><i class="fa fa-arrow-down"></i><span>總投注</span><span>${currentSession.stats.totalBet}</span></div><div class="stat-card"><i class="fa fa-arrow-up"></i><span>總獲得</span><span>${currentSession.stats.totalWin}</span></div><div class="stat-card"><i class="fa fa-film"></i><span>BB</span><span>${currentSession.stats.bbCount}</span></div><div class="stat-card"><i class="fa fa-pie-chart"></i><span>勝率</span><span>${winRate}%</span></div>`;
                renderBetModalTable();
                document.getElementById('betModal').classList.add('active');
            };
            
            function renderBetModalTable() {
                if (!currentSession) return;
                let details = [...currentSession.details].sort((a, b) => betSortOrder === 'desc' ? b.date - a.date : a.date - b.date);
                let html = '';
                details.forEach(d => {
                    let typeLabel = '', typeClass = '';
                    if (d.type === 'BRING_IN') { typeLabel = '帶入'; typeClass = 'type-bringin'; }
                    else if (d.type === 'BRING_OUT') { typeLabel = '帶出'; typeClass = 'type-bringout'; }
                    else if (d.type === 'BB') { typeLabel = 'BB'; typeClass = 'type-bb'; }
                    else { typeLabel = '一般'; typeClass = 'type-bet'; }
                    html += `<tr><td class="text-blue-200">${formatDateTime(d.date)}</td><td><span class="record-type ${typeClass}">${typeLabel}</span></td><td class="${d.bet > 0 ? 'amount-negative' : ''}">${d.bet > 0 ? `-${d.bet}` : '-'}</td><td class="${d.win > 0 ? 'amount-positive' : ''}">${d.win > 0 ? `+${d.win}` : '-'}</td><td class="amount-total">${d.total}</td><td><span class="bet-id" onclick="event.stopPropagation(); openBetDetail('${d.betId}', '${d.type}', ${d.total})">${d.betId}</span></td><td>${d.videoType ? `<span class="video-tag"><i class="fa fa-film"></i> ${d.videoType}</span>` : '-'}</td></tr>`;
                });
                document.getElementById('betModalTableBody').innerHTML = html;
            }
            
            window.openBetDetail = function(betId, type, total) {
                document.getElementById('betDetailTitle').textContent = `注單 ${betId}`;
                let content = '';
                if (type === 'BRING_IN') content = `<div class="row"><span class="label">類型</span><span class="value">點數轉代幣</span></div><div class="row"><span class="label">獲得代幣</span><span class="value positive">+${total}</span></div>`;
                else if (type === 'BRING_OUT') { const net = currentSession?.bringOutAmount - currentSession?.bringInAmount || 0; content = `<div class="row"><span class="label">類型</span><span class="value">代幣轉點數</span></div><div class="row"><span class="label">淨獲得</span><span class="value ${net >= 0 ? 'positive' : 'negative'}">${net >= 0 ? '+' : ''}${net}</span></div>`; }
                else content = `<div class="row"><span class="label">類型</span><span class="value">${type === 'BB' ? '大當' : '一般轉數'}</span></div><div class="row"><span class="label">注單編號</span><span class="value">${betId}</span></div><div class="row"><span class="label">合計</span><span class="value">${total}</span></div>`;
                document.getElementById('betDetailContent').innerHTML = content;
                document.getElementById('betDetailModal').classList.add('active');
            };
            
            window.toggleBetSort = function() { betSortOrder = betSortOrder === 'desc' ? 'asc' : 'desc'; document.getElementById('betSortIcon').textContent = betSortOrder === 'desc' ? '▼' : '▲'; renderBetModalTable(); };
            window.closeBetModal = () => document.getElementById('betModal').classList.remove('active');
            window.closeBetDetailModal = () => document.getElementById('betDetailModal').classList.remove('active');
            
            document.getElementById('searchInput')?.addEventListener('input', (e) => { searchTerm = e.target.value; renderSessions(); });
            document.getElementById('dateSearchBtn')?.addEventListener('click', () => { dateStart = new Date(document.getElementById('startDate').value); dateEnd = new Date(document.getElementById('endDate').value); dateEnd.setHours(23, 59, 59); renderSessions(); });
            document.getElementById('filterSelect')?.addEventListener('change', (e) => {
                const selectedType = e.target.value;
                const container = document.getElementById('transactionContainer');
                if (selectedType === 'all') { renderTransactionCards(); }
                else {
                    const filtered = allTransactions.filter(t => t.type === selectedType).sort((a, b) => b.date - a.date);
                    let html = '';
                    filtered.forEach(trans => {
                        const isPositive = trans.amount > 0;
                        const amountSign = isPositive ? '+' : '';
                        const amountClass = isPositive ? 'positive' : 'negative';
                        const dateStr = trans.date.toLocaleString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
                        html += `<div class="transaction-card ${trans.cardClass}" onclick="openTransactionDetail('${trans.id}', '${trans.typeName}', ${Math.abs(trans.amount)}, '${trans.orderId}', '${dateStr}', '${trans.detail}', ${isPositive})"><div class="transaction-card-header"><div class="transaction-name"><i class="fa ${trans.icon}"></i> ${trans.typeName}</div><span class="transaction-type" style="background: ${isPositive ? '#2a6e8a' : '#8a5a2a'}; color: white;">${isPositive ? '收入' : '支出'}</span></div><div class="transaction-amount ${amountClass}">${amountSign}${Math.abs(trans.amount)} 點</div><div class="transaction-detail"><span><i class="fa fa-calendar"></i> ${dateStr}</span><span><i class="fa fa-hashtag"></i> ${trans.orderId}</span><span><i class="fa fa-info-circle"></i> ${trans.detail}</span></div></div>`;
                    });
                    container.innerHTML = html || '<div class="text-center text-gray-400 py-4">暫無此類型交易記錄</div>';
                }
            });
            
            renderFavorites();
            renderKeep();
            renderTransactionCards();
            renderSessions();
            setInterval(() => { if(document.getElementById('keepMachineList').classList.contains('show')) updateCountdowns(); }, 1000);
        })();
    </script>
</body>
</html>
