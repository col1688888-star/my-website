<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>我的 · 注單明細 · 小丑系列</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;500;700;900&family=Noto+Sans+JP:wght@300;500;700;900&family=Russo+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0c1a; color: #fff; font-family: 'Noto Sans TC', 'Orbitron', sans-serif; min-height: 100vh; }
        .max-w-md { max-width: 448px; margin: 0 auto; height: 100vh; background: linear-gradient(145deg, #0f1425, #0a0e1f); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 50px rgba(74,128,192,0.2); border-left: 1px solid rgba(74,128,192,0.2); border-right: 1px solid rgba(153,0,255,0.2); }
        
        ::-webkit-scrollbar { width: 4px; background: transparent; }
        ::-webkit-scrollbar-track { background: rgba(74, 128, 192, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(74, 128, 192, 0.5); border-radius: 10px; }
        
        .metal-header { background: linear-gradient(145deg, #2a2f3f, #1a1f2f); border-bottom: 2px solid #4a80c0; padding: 16px; flex-shrink: 0; border-radius: 0 0 24px 24px; }
        .avatar-container { width: 65px; height: 65px; border-radius: 50%; background: linear-gradient(145deg, #2a2f3f, #1a1f2f); border: 2px solid #4a80c0; overflow: hidden; cursor: pointer; position: relative; }
        .avatar-container img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); font-size: 10px; text-align: center; }
        .nickname-edit { font-size: 1.3rem; font-weight: bold; cursor: pointer; border-bottom: 1px dashed #4a80c0; }
        .vip-badge { background: linear-gradient(135deg, #b8860b, #ffd700); color: #000; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .points-display { background: linear-gradient(145deg, #4a3a1a, #3a2a0a); padding: 5px 14px; border-radius: 30px; color: #ffd966; font-weight: bold; border: 1px solid #ffd700; cursor: pointer; }
        .progress-bar { height: 5px; background: #2a2f3f; border-radius: 10px; overflow: hidden; margin-top: 12px; }
        .progress-fill { width: 28%; height: 100%; background: linear-gradient(90deg, #ffd966, #ffaa33); border-radius: 10px; }
        
        .action-grid-btn { background: linear-gradient(145deg, #3a4050, #2a2f40); border: 1px solid #4a80c0; border-radius: 16px; padding: 12px; text-align: center; cursor: pointer; position: relative; box-shadow: 0 4px 0 #0f121c; }
        .count-badge { position: absolute; top: -8px; right: -8px; background: #ff4444; color: white; font-size: 11px; min-width: 22px; height: 22px; border-radius: 30px; display: flex; align-items: center; justify-content: center; border: 1px solid #ffd966; }
        
        .search-layout { display: grid; gap: 10px; margin-bottom: 16px; }
        .search-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .date-group { background: linear-gradient(145deg, #2a2f3f, #1a1f2f); border: 1px solid #4a80c0; border-radius: 30px; padding: 8px 12px; display: flex; gap: 6px; }
        .date-group input { background: transparent; border: none; color: white; font-size: 12px; width: 100px; cursor: pointer; }
        .date-group input::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        .search-btn { background: linear-gradient(145deg, #3a5065, #2a4055); border: 1px solid #4a80c0; border-radius: 30px; padding: 8px; color: white; cursor: pointer; text-align: center; font-weight: bold; }
        .search-box { background: linear-gradient(145deg, #2a2f3f, #1a1f2f); border: 1px solid #4a80c0; border-radius: 30px; padding: 8px 14px; display: flex; gap: 8px; flex: 1; }
        .search-box input { background: transparent; border: none; color: white; width: 100%; outline: none; }
        .filter-select { width: 100%; background: #ffffff; border: 2px solid #4a80c0; border-radius: 30px; padding: 6px 28px 6px 14px; color: #1a1f2f; font-weight: 600; font-size: 0.75rem; appearance: none; cursor: pointer; height: 40px; }
        
        .stats-card { background: linear-gradient(145deg, #002b4a, #001a2a); border-radius: 16px; padding: 14px; margin-bottom: 16px; border: 1px solid #4a80c0; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); text-align: center; }
        .stats-label { font-size: 11px; color: #80e4ff; }
        .stats-value { font-size: 18px; font-weight: bold; color: #ffd966; }
        
        .main-row { background: linear-gradient(145deg, #1a1f2f, #0f1425); border: 2px solid #4a80c0; border-radius: 16px; margin-bottom: 12px; cursor: pointer; padding: 14px 16px; transition: 0.2s; }
        .main-row:hover { border-color: #ffd700; transform: translateY(-2px); }
        .machine-title .name { font-size: 16px; font-weight: bold; color: #ffd966; }
        .machine-title .number { font-size: 12px; color: #80e4ff; margin-left: 6px; }
        .date-range { font-size: 11px; color: #b0c4de; margin: 8px 0; }
        .bring-in { color: #88ffaa; }
        .bring-out { color: #ffaa88; }
        .net-profit.positive { color: #ffaa66; }
        .net-profit.negative { color: #ff6666; }
        
        .tx-card { background: linear-gradient(145deg, #1a2a3a, #0f1f2f); border: 2px solid #4a80c0; border-radius: 20px; padding: 12px 16px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .tx-card:hover { border-color: #ffd966; transform: translateY(-1px); }
        .tx-name { font-size: 1rem; font-weight: bold; color: #ffd966; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .tx-platform { font-size: 0.8rem; color: #80e4ff; margin-bottom: 6px; }
        .tx-points { font-size: 1rem; font-weight: bold; margin-bottom: 6px; }
        .tx-points.positive-red { color: #ff6666; }
        .tx-points.negative-green { color: #88ff88; }
        .tx-date { font-size: 0.65rem; color: #aaccff; display: flex; align-items: center; gap: 4px; }
        
        .tx-detail-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.96); backdrop-filter: blur(12px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .tx-detail-modal.active { display: flex; }
        .tx-detail-modal .modal-content { width: 90%; max-width: 380px; background: linear-gradient(145deg, #1a1f2f, #0f1425); border: 3px solid #4a80c0; border-radius: 28px; padding: 20px; }
        
        .bet-modal, .favorite-modal, .keep-modal, .video-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.96); backdrop-filter: blur(12px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .bet-modal.active, .favorite-modal.active, .keep-modal.active, .video-modal.active { display: flex; }
        .bet-modal-content { width: 92%; max-width: 550px; height: 85vh; background: linear-gradient(145deg, #1a1f2f, #0f1425); border: 3px solid #4a80c0; border-radius: 28px; padding: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .favorite-modal-content, .keep-modal-content { width: 90%; max-width: 420px; max-height: 80vh; background: linear-gradient(145deg, #1a1f2f, #0f1425); border: 3px solid #ff6680; border-radius: 28px; padding: 20px; overflow-y: auto; }
        .video-modal-content { width: 90%; max-width: 500px; background: #000; border-radius: 28px; border: 3px solid #ff66aa; overflow: hidden; }
        .video-modal-content video { width: 100%; max-height: 60vh; background: #000; }
        .video-header { background: linear-gradient(145deg, #2a2f3f, #1a1f2f); padding: 12px 16px; display: flex; justify-content: space-between; color: #ffd966; border-bottom: 1px solid #ff66aa; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; color: #ffd966; font-size: 18px; font-weight: bold; margin-bottom: 16px; }
        .modal-close { cursor: pointer; font-size: 24px; width: 32px; text-align: center; }
        .stats-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
        .stat-card { background: #2a2f3f; padding: 4px 12px; border-radius: 30px; font-size: 11px; }
        .bet-modal-table-container { flex: 1; overflow: auto; border-radius: 16px; border: 1px solid #4a80c0; }
        .bet-modal-table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 650px; }
        .bet-modal-table th, .bet-modal-table td { padding: 10px 6px; border-bottom: 1px solid #2a4f7a; text-align: left; }
        .bet-modal-table th { background: #2a2f3f; color: #ffd966; position: sticky; top: 0; cursor: pointer; user-select: none; }
        .bet-modal-table th:hover { background: #3a4055; }
        .sort-icon { display: inline-block; margin-left: 4px; font-size: 10px; }
        .record-type { display: inline-block; padding: 2px 10px; border-radius: 30px; font-size: 10px; font-weight: bold; }
        .type-bringin { background: #1a4530; color: #a0ffc0; }
        .type-bringout { background: #452a2a; color: #ffb0b0; }
        .type-spin { background: #554a1a; color: #ffd966; }
        .amount-negative { color: #88ff88; }
        .amount-positive { color: #ff8888; }
        .amount-total { font-weight: bold; color: #ffd966; }
        .total-positive { color: #88ff88; font-weight: bold; }
        .total-negative { color: #ff8888; font-weight: bold; }
        .video-bet-row { cursor: pointer; background: linear-gradient(90deg, rgba(59,130,246,0.25), transparent); border-left: 4px solid #3b82f6; }
        .video-bet-row:hover { background: linear-gradient(90deg, rgba(59,130,246,0.45), rgba(59,130,246,0.1)); }
        .play-hint { display: inline-flex; align-items: center; gap: 4px; background: #1e3a8a; padding: 2px 8px; border-radius: 20px; font-size: 9px; margin-left: 8px; color: #93c5fd; }
        
        /* 收藏/保留卡片增強樣式 */
        .machine-card {
            background: linear-gradient(145deg, #1a1f2f, #0f1425);
            border: 2px solid #4a80c0;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            gap: 14px;
            align-items: center;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .machine-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.1), transparent);
            transition: left 0.5s ease;
        }
        .machine-card:hover::before {
            left: 100%;
        }
        .machine-card:hover {
            transform: translateX(4px);
            border-color: #ffd966;
            box-shadow: 0 0 15px rgba(255,217,102,0.3);
        }
        .machine-card img {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            object-fit: cover;
            border: 2px solid #ffd966;
            box-shadow: 0 0 12px rgba(255,217,102,0.5);
            background: linear-gradient(145deg, #2a2a3a, #1a1a2a);
        }
        .machine-info {
            flex: 1;
        }
        .machine-name {
            font-weight: bold;
            color: #ffd966;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .machine-stats {
            display: flex;
            gap: 8px;
            margin: 8px 0;
            font-size: 0.7rem;
            flex-wrap: wrap;
        }
        .machine-stats span {
            background: rgba(74,128,192,0.2);
            padding: 2px 8px;
            border-radius: 20px;
            color: #80e4ff;
        }
        .hot-badge {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .play-btn {
            background: linear-gradient(145deg, #2a6a4a, #1a4a3a);
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            display: inline-block;
            transition: all 0.15s ease;
            border: 1px solid #88ffaa;
            box-shadow: 0 3px 0 #0a2a1a;
        }
        .play-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #0a2a1a;
            background: linear-gradient(145deg, #3a8a5a, #2a5a4a);
        }
        .play-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0a2a1a;
        }
        .cancel-btn {
            background: linear-gradient(145deg, #7f2a2a, #5f1a1a);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid #ff8888;
            box-shadow: 0 3px 0 #3a0a0a;
            transition: all 0.15s ease;
        }
        .cancel-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #3a0a0a;
            background: linear-gradient(145deg, #9f3a3a, #7f2a2a);
        }
        .cancel-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #3a0a0a;
        }
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: #9ca3af;
        }
        .empty-state i {
            font-size: 4rem;
            color: #4a80c0;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        .empty-state p {
            font-size: 0.9rem;
        }
        .empty-state .hint {
            font-size: 0.7rem;
            margin-top: 12px;
            color: #ffd966;
        }
        
        /* ========== 下方導覽列樣式 - 按鈕寬度 50px，間距自動平均分配 ========== */
        .bottom-nav {
            background: linear-gradient(145deg, #2a2f3f, #1a1f2f);
            border-top: 2px solid #4a80c0;
            border-bottom: 2px solid #4a80c0;
            box-shadow: 
                0 -5px 15px rgba(74, 128, 192, 0.3),
                0 8px 10px rgba(0, 0, 0, 0.6),
                inset 0 2px 5px rgba(255, 255, 255, 0.3),
                inset 0 -3px 8px rgba(0, 0, 0, 0.6);
            width: 100%;
            padding: 0.75rem 1.5rem;
            position: relative;
            overflow: hidden;
            border-radius: 30px 30px 30px 30px;
            transition: all 0.2s;
            flex-shrink: 0;
            margin-top: auto;
        }

        /* 金屬流光特效 */
        .bottom-nav::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: skewX(-20deg);
            animation: shine 4s infinite;
            pointer-events: none;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 120%; }
            100% { left: 120%; }
        }

        /* 導覽項目容器 - 自動平均分配間距 */
        .nav-items-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 0;
        }

        /* 每個導覽按鈕樣式 — 立體金屬凸起效果，寬度固定 50px */
        .nav-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #b0c4de;
            transition: all 0.1s ease;
            border-radius: 20px;
            padding: 0.5rem 0;
            text-decoration: none;
            outline: none;
            font-family: 'Noto Sans TC', 'Noto Sans JP', 'Orbitron', sans-serif;
            background: linear-gradient(145deg, #3a4050, #2a2f40);
            box-shadow: 
                0 5px 0 #0f121c,
                inset 0 2px 5px rgba(255, 255, 255, 0.3),
                inset 0 -3px 5px rgba(0, 0, 0, 0.3);
            text-shadow: 0 2px 3px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(74, 128, 192, 0.2);
            cursor: pointer;
            text-align: center;
            
            /* 固定寬度 50px */
            flex: none;
            width: 50px;
        }

        /* 懸浮效果: 向上浮起 */
        .nav-item:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 8px 0 #0f121c,
                0 12px 20px rgba(74, 128, 192, 0.4),
                inset 0 2px 5px rgba(255, 255, 255, 0.5),
                inset 0 -3px 5px rgba(0, 0, 0, 0.3);
            color: #ffffff;
            border-color: rgba(74, 128, 192, 0.6);
        }

        /* 點擊按壓效果 */
        .nav-item:active {
            transform: translateY(3px);
            box-shadow: 
                0 2px 0 #0f121c,
                inset 0 5px 8px rgba(0, 0, 0, 0.5),
                inset 0 -2px 5px rgba(255, 255, 255, 0.2);
            color: #4a80c0;
        }

        /* 當前頁面（active）高亮效果 */
        .nav-item.current-page {
            background: linear-gradient(145deg, #4a5065, #3a4055);
            box-shadow: 
                0 5px 0 #0f121c,
                0 10px 15px rgba(74, 128, 192, 0.5),
                inset 0 2px 8px rgba(255, 255, 255, 0.6),
                inset 0 -3px 8px rgba(0, 0, 0, 0.4);
            color: white;
            border: 1px solid #4a80c0;
            transform: scale(1.05);
            text-shadow: 0 0 8px #4a80c0;
        }

        /* 圖示大小與陰影 */
        .nav-item i {
            font-size: 1.4rem;
            margin-bottom: 2px;
            filter: drop-shadow(0 3px 2px rgba(0, 0, 0, 0.5));
        }

        /* 導覽文字 */
        .nav-item span {
            font-weight: 700;
            letter-spacing: 0.5px;
            font-size: 0.7rem;
        }

        /* 小紅點 (公告未讀標記) */
        .nav-badge {
            position: absolute;
            top: 4px;
            right: 12px;
            width: 10px;
            height: 10px;
            background-color: #ff4d4d;
            border-radius: 50%;
            border: 1px solid rgba(255,215,0,0.6);
            box-shadow: 0 0 6px #ff4d4d;
            display: none;
        }

        .nav-badge.show {
            display: block;
        }

        /* 適應觸控螢幕 */
        @media (hover: hover) {
            .nav-item:hover {
                transform: translateY(-5px);
            }
        }

        /* 手機小螢幕時稍微縮減 */
        @media (max-width: 420px) {
            .bottom-nav {
                padding: 0.5rem 1rem;
            }
            .nav-item {
                padding: 0.4rem 0;
                width: 45px;
            }
            .nav-item i {
                font-size: 1.2rem;
            }
            .nav-item span {
                font-size: 0.6rem;
            }
        }
        
        .section-title { color: #ffd966; font-size: 18px; font-weight: bold; border-bottom: 2px solid #ffaa33; padding-bottom: 8px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .gap-2 { gap: 8px; }
        .mt-2 { margin-top: 8px; }
        .px-4 { padding-left: 16px; padding-right: 16px; }
        .overflow-y-auto { overflow-y: auto; }
        .flex-1 { flex: 1; }
        .text-center { text-align: center; }
        .text-gray-400 { color: #9ca3af; }
        .hidden { display: none; }
        .space-y-2 > * + * { margin-top: 8px; }
        .mb-4 { margin-bottom: 16px; }
        .cursor-pointer { cursor: pointer; }
    </style>
</head>
<body>
<div class="max-w-md flex flex-col">
    <header class="metal-header">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="avatar-container" id="avatarContainer">
                    <img id="avatarImage" src="https://i.pravatar.cc/150?img=7">
                    <div class="avatar-overlay">更換</div>
                </div>
                <div>
                    <div class="flex items-center gap-1">
                        <span id="displayNickname" class="nickname-edit">郝可愛</span>
                        <i class="fa fa-pencil-square-o text-blue-400 text-sm"></i>
                    </div>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="vip-badge" id="vipBadge">VIP 1</span>
                        <span class="text-blue-300 text-xs cursor-pointer">經驗值 680/1,200</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <div class="points-display" id="headerPoints">💰 <span id="userPoints">6,600</span></div>
                <a href="index.html" class="bg-gray-700 w-10 h-10 rounded-full flex items-center justify-center"><i class="fa fa-home"></i></a>
            </div>
        </div>
        <div class="progress-bar mt-2"><div class="progress-fill"></div></div>
    </header>

    <div class="px-4 mt-4">
        <div class="grid grid-cols-3 gap-2">
            <div class="action-grid-btn" id="favMachinesBtn"><span class="count-badge" id="favCount">2</span><i class="fa fa-heart text-pink-400 text-xl"></i><div class="text-xs mt-1">收藏</div></div>
            <div class="action-grid-btn" id="keepMachinesBtn"><span class="count-badge keep" id="keepCount">1</span><i class="fa fa-bookmark text-orange-400 text-xl"></i><div class="text-xs mt-1">保留</div></div>
            <div class="action-grid-btn" id="supportBtn"><i class="fa fa-headphones text-blue-400 text-xl"></i><div class="text-xs mt-1">客服</div></div>
        </div>
    </div>

    <main class="flex-1 overflow-y-auto px-4 py-3">
        <div class="section-title"><i class="fa fa-list-alt"></i> 記錄總覽</div>
        
        <div class="search-layout">
            <div class="search-row">
                <div class="date-group">
                    <input type="date" id="startDate" value="2026-03-01">

                    <input type="date" id="endDate" value="2026-03-31">

                <button id="dateSearchBtn" class="search-btn">搜尋</button>

            <div class="search-row">
                <div class="search-box">

                </div>
                <select id="filterSelect" class="filter-select">
                    <option value="all" selected>全部記錄</option>
                    <option value="bet_detail">注單明細</option>

                <span>機台</span>
            </a>

                <span>公告</span>

<div id="betModal" class="bet-modal">
    <div class="bet-modal-content">
        <div class="modal-header"><span><i class="fa fa-list-alt"></i> <span id="betModalTitle">機台明細</span></span><span class="modal-close" onclick="closeBetModal()">✕</span></div>
        <div class="stats-row" id="betStats"></div>
        <div class="bet-modal-table-container"><table class="bet-modal-table"><thead id="betTableHead"></thead><tbody id="betModalTableBody"></tbody></table></div>
    </div>
</div>

<div id="videoModal" class="video-modal">
    <div class="video-modal-content">
        <div class="video-header"><span><i class="fa fa-video-camera"></i> 遊戲錄影回放</span><span class="modal-close" onclick="closeVideoModal()">✕</span></div>
        <video id="videoPlayer" controls autoplay></video>
        <div class="text-center text-gray-400 text-xs py-2">🎬 從帶入代幣到帶出代幣 · 完整遊戲過程</div>
    </div>
</div>

<div id="txDetailModal" class="tx-detail-modal">
    <div class="modal-content">
        <div class="modal-header"><span>交易明細</span><span class="modal-close" onclick="closeTxModal()">✕</span></div>
        <div id="txDetailContent"></div>
    </div>
</div>

<div id="favoriteModal" class="favorite-modal"><div class="favorite-modal-content"><div class="modal-header"><span><i class="fa fa-heart"></i> 我的收藏</span><span class="modal-close" onclick="closeFavoriteModal()">✕</span></div><div id="favoriteModalBody"></div></div></div>
<div id="keepModal" class="keep-modal"><div class="keep-modal-content"><div class="modal-header"><span><i class="fa fa-bookmark"></i> 我的保留</span><span class="modal-close" onclick="closeKeepModal()">✕</span></div><div id="keepModalBody"></div></div></div>

<script>
(function() {
    let userPoints = 6600;
    let betSortOrder = 'desc';
    const videoUrls = ["https://www.w3schools.com/html/mov_bbb.mp4", "https://www.w3schools.com/html/movie.mp4", "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4", "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/earth.mp4"];
    
    const JOKER_IMAGE_URL = "https://i.pinimg.com/736x/c3/72/db/c372db1b020ebf778ef707f63c122bf7.jpg";
    
    function generateSessions() {
        const machines = [{ name: 'GOGO 小丑', number: 'J001' }, { name: '我是小丑-EX', number: 'J002' }, { name: '快樂小丑 VII', number: 'J003' }, { name: '新我是小丑-EX水晶版', number: 'J004' }];
        const sessions = [];
        for (let i = 0; i < machines.length; i++) {
            const m = machines[i];
            const day = 5 + i * 6;
            const bringInTime = new Date(2026, 2, day, 14, 30);
            const bringOutTime = new Date(2026, 2, day, 15, 45);
            const bringInAmount = 500 + i * 150;
            const details = [];
            details.push({ date: new Date(bringInTime), type: 'BRING_IN', bet: 0, win: bringInAmount, total: bringInAmount, betId: `IN${i+1}` });
            let currentTotal = bringInAmount;
            let totalBet = 0, totalWin = 0;
            const spinCount = 10 + Math.floor(Math.random() * 10);
            for (let s = 0; s < spinCount; s++) {
                const spinTime = new Date(bringInTime.getTime() + (s + 1) * 75000);
                const bet = 6 + Math.floor(Math.random() * 14);
                const win = Math.random() < 0.42 ? bet * (1 + Math.floor(Math.random() * 3)) : 0;
                currentTotal = currentTotal - bet + win;
                totalBet += bet;
                totalWin += win;
                details.push({ date: spinTime, type: 'SPIN', bet: bet, win: win, total: currentTotal, betId: `SP${i+1}-${s+1}`, isFirstSpin: (s === 0) });
            }
            const bringOutAmount = Math.max(100, currentTotal - Math.random() * 280);
            details.push({ date: new Date(bringOutTime), type: 'BRING_OUT', bet: 0, win: 0, total: bringOutAmount, betId: `OUT${i+1}` });
            sessions.push({
                machineName: m.name, machineNumber: m.number, bringInTime, bringOutTime,
                bringInAmount, bringOutAmount: Math.floor(bringOutAmount),
                netProfit: Math.floor(bringOutAmount - bringInAmount),
                details, stats: { totalSpins: spinCount, totalBet, totalWin },
                videoUrl: videoUrls[i % videoUrls.length]
            });
        }
        return sessions;
    }
    
    function generateTransactions() {
        const platforms = ['BBIN', 'TZ', '搖錢樹', 'FDY', '富大爺'];
        const types = [
            { type: 'platform_in', name: '平台轉入', icon: 'fa-download', isPositive: false, unit: '點' },
            { type: 'platform_out', name: '平台轉出', icon: 'fa-upload', isPositive: true, unit: '點' },
            { type: 'platform_add', name: '人工上分', icon: 'fa-user-plus', isPositive: true, unit: '點' },
            { type: 'platform_sub', name: '人工下分', icon: 'fa-user-minus', isPositive: false, unit: '點' },
            { type: 'token_in', name: '代幣帶入', icon: 'fa-arrow-down', isPositive: false, unit: '枚' },
            { type: 'token_out', name: '代幣帶出', icon: 'fa-arrow-up', isPositive: true, unit: '枚' },
            { type: 'bonus', name: '活動贈分', icon: 'fa-gift', isPositive: true, unit: '點' },
            { type: 'shop', name: '購買道具', icon: 'fa-shopping-cart', isPositive: false, unit: '點' }
        ];
        let txs = [];
        let idCounter = 1;
        types.forEach(tt => {
            for (let i = 0; i < 5; i++) {
                let day = 5 + Math.floor(Math.random() * 25);
                let date = new Date(2026, 2, day, Math.floor(Math.random() * 24), Math.floor(Math.random() * 60));
                let points = Math.floor(Math.random() * 3000) + 100;
                let platformName = tt.type === 'shop' ? '商城' : platforms[Math.floor(Math.random() * platforms.length)];
                txs.push({ 
                    id: `${tt.type}_${idCounter++}`, 
                    type: tt.type, 
                    name: tt.name, 
                    icon: tt.icon, 
                    platform: platformName, 
                    points: tt.isPositive ? -points : points, 
                    unit: tt.unit,
                    date: date 
                });
            }
        });
        return txs.sort((a, b) => b.date - a.date);
    }
    
    let allSessions = generateSessions();
    let allTransactions = generateTransactions();
    let currentSession = null;
    let dateStart = new Date('2026-03-01'), dateEnd = new Date('2026-03-31');
    dateEnd.setHours(23, 59, 59, 999);
    let searchTerm = '';
    let currentFilter = 'all';
    
    let favoriteMachines = [
        { id: 1, name: 'GOGO 小丑', number: 'J001', image: JOKER_IMAGE_URL, ratio: '2.5' },
        { id: 2, name: '我是小丑-EX', number: 'J002', image: JOKER_IMAGE_URL, ratio: '2.8' }
    ];
    let keepMachines = [
        { id: 4, name: '新我是小丑-EX水晶版', number: 'J004', image: JOKER_IMAGE_URL, ratio: '3.0' }
    ];
    
    function updateBadges() {
        document.getElementById('favCount').innerText = favoriteMachines.length;
        document.getElementById('keepCount').innerText = keepMachines.length;
    }
    
    window.removeFromFavorite = function(machineId) {
        favoriteMachines = favoriteMachines.filter(m => m.id !== machineId);
        updateBadges();
        renderFavoriteModal();
    };
    
    window.removeFromKeep = function(machineId) {
        keepMachines = keepMachines.filter(m => m.id !== machineId);
        updateBadges();
        renderKeepModal();
    };
    
    window.enterMachine = function(machineName) {
        alert(`小丑狂歡樂園 · 正在進入「${machineName}」機台，祝您幸運連連！`);
    };
    
    function renderFavoriteModal() {
        let html = '';
        if (favoriteMachines.length === 0) {
            html = `<div class="empty-state">
                        <i class="fa fa-heart-o"></i>
                        <p>暫無收藏機台</p>
                        <p class="hint">可至機台頁面點擊收藏您喜愛的機台</p>
                    </div>`;
        } else {
            favoriteMachines.forEach((m, idx) => {
                const lastPlay = `2026/03/${10 + idx} 14:30`;
                const hotText = idx === 0 ? '<span class="hot-badge">熱門</span>' : '';
                html += `
                    <div class="machine-card">
                        <img src="${m.image}" alt="小丑機台" onerror="this.src='https://i.pravatar.cc/150?img=13'">
                        <div class="machine-info">
                            <div class="machine-name">
                                ${m.name}
                                ${hotText}
                            </div>
                            <div class="machine-stats">
                                <span>${m.number}</span>
                                <span>每枚 ${m.ratio}</span>
                                <span>上次 ${lastPlay}</span>
                                <span>天井 1280</span>
                            </div>
                            <div class="action-buttons">
                                <div class="play-btn" onclick="enterMachine('${m.name}')">進入遊戲</div>
                                <div class="cancel-btn" onclick="removeFromFavorite(${m.id})">取消收藏</div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        document.getElementById('favoriteModalBody').innerHTML = html;
        document.getElementById('favoriteModal').classList.add('active');
    }
    
    function renderKeepModal() {
        let html = '';
        if (keepMachines.length === 0) {
            html = `<div class="empty-state">
                        <i class="fa fa-bookmark-o"></i>
                        <p>暫無保留機台</p>
                        <p class="hint">可至機台頁面點擊保留，下次快速進入</p>
                    </div>`;
        } else {
            keepMachines.forEach((m, idx) => {
                const lastPlay = `2026/03/${15 + idx} 20:15`;
                const saveNote = idx === 0 ? '最愛玩這台' : '試試手氣';
                html += `
                    <div class="machine-card">
                        <img src="${m.image}" alt="小丑保留機台" onerror="this.src='https://i.pravatar.cc/150?img=13'">
                        <div class="machine-info">
                            <div class="machine-name">
                                ${m.name}
                            </div>
                            <div class="machine-stats">
                                <span>${m.number}</span>
                                <span>每枚 ${m.ratio}</span>
                                <span>上次 ${lastPlay}</span>
                                <span>${saveNote}</span>
                                <span>天井 980</span>
                            </div>
                            <div class="action-buttons">
                                <div class="play-btn" onclick="enterMachine('${m.name}')">進入遊戲</div>
                                <div class="cancel-btn" onclick="removeFromKeep(${m.id})">取消保留</div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        document.getElementById('keepModalBody').innerHTML = html;
        document.getElementById('keepModal').classList.add('active');
    }
    
    function formatDateTime(d) { return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
    function formatDate(d) { return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`; }
    function formatTime(d) { return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
    
    function getFilteredSessions() {
        let f = allSessions.filter(s => s.bringInTime >= dateStart && s.bringInTime <= dateEnd);
        if (searchTerm) f = f.filter(s => s.machineName.toLowerCase().includes(searchTerm) || s.machineNumber.toLowerCase().includes(searchTerm));
        return f;
    }
    
    function getFilteredTransactions() {
        let f = allTransactions.filter(t => t.date >= dateStart && t.date <= dateEnd);
        if (currentFilter !== 'all' && currentFilter !== 'bet_detail') f = f.filter(t => t.type === currentFilter);
        if (searchTerm && currentFilter !== 'bet_detail') f = f.filter(t => t.name.toLowerCase().includes(searchTerm));
        return f;
    }
    
    function render() {
        if (currentFilter === 'bet_detail') {
            document.getElementById('transactionContainer').style.display = 'none';
            document.getElementById('sessionsContainer').style.display = 'block';
            renderSessions();
        } else {
            document.getElementById('transactionContainer').style.display = 'block';
            document.getElementById('sessionsContainer').style.display = 'none';
            renderTransactions();
        }
    }
    
    function renderSessions() {
        let f = getFilteredSessions();
        let totalBet = f.reduce((a, b) => a + b.stats.totalBet, 0);
        let totalWin = f.reduce((a, b) => a + b.stats.totalWin, 0);
        let net = totalWin - totalBet;
        document.getElementById('statsContainer').innerHTML = `<div class="stats-grid"><div><div class="stats-label">總投注</div><div class="stats-value">${totalBet}</div></div><div><div class="stats-label">總獲得</div><div class="stats-value">${totalWin}</div></div><div><div class="stats-label">淨損益</div><div class="stats-value" style="color:${net >= 0 ? '#ffaa66' : '#ff6666'}">${net >= 0 ? '+' : ''}${net}</div></div></div>`;
        if (f.length === 0) { document.getElementById('sessionsContainer').innerHTML = '<div class="text-center text-gray-400 py-8">沒有注單記錄</div>'; return; }
        let html = '';
        f.forEach((s, idx) => {
            let profitClass = s.netProfit >= 0 ? 'positive' : 'negative';
            html += `<div class="main-row" onclick="openBetModal(${idx})"><div><div class="machine-title"><span class="name">${s.machineName}</span><span class="number">${s.machineNumber}</span></div><div class="date-range">${formatDate(s.bringInTime)} ~ ${formatDate(s.bringOutTime)} ${formatTime(s.bringInTime)}~${formatTime(s.bringOutTime)}</div><div class="amount-info"><span class="bring-in">帶入 ${s.bringInAmount}</span> → <span class="bring-out">帶出 ${s.bringOutAmount}</span> | <span class="net-profit ${profitClass}">淨利 ${s.netProfit >= 0 ? '+' : ''}${s.netProfit}</span></div></div></div>`;
        });
        document.getElementById('sessionsContainer').innerHTML = html;
    }
    
    function renderTransactions() {
        let f = getFilteredTransactions();
        let totalIn = f.filter(t => t.points < 0).reduce((a, b) => a + Math.abs(b.points), 0);
        let totalOut = f.filter(t => t.points > 0).reduce((a, b) => a + b.points, 0);
        let net = totalOut - totalIn;
        document.getElementById('statsContainer').innerHTML = `<div class="stats-grid"><div><div class="stats-label">總存入</div><div class="stats-value">${totalIn}</div></div><div><div class="stats-label">總提出</div><div class="stats-value">${totalOut}</div></div><div><div class="stats-label">淨變化</div><div class="stats-value" style="color:${net >= 0 ? '#ffaa66' : '#ff6666'}">${net >= 0 ? '+' : ''}${net}</div></div></div>`;
        if (f.length === 0) { document.getElementById('transactionContainer').innerHTML = '<div class="text-center text-gray-400 py-8">沒有交易記錄</div>'; return; }
        let html = '';
        f.forEach((tx) => {
            let isPositive = tx.points > 0;
            let symbol = isPositive ? '-' : '+';
            let colorClass = isPositive ? 'negative-green' : 'positive-red';
            html += `<div class="tx-card" onclick="showTxDetail('${tx.id}','${tx.name}','${tx.platform}',${Math.abs(tx.points)},'${formatDateTime(tx.date)}',${isPositive},'${tx.unit}')"><div class="tx-name">${tx.name}</div><div class="tx-platform">${tx.platform}</div><div class="tx-points ${colorClass}">${symbol}${Math.abs(tx.points)} ${tx.unit}</div><div class="tx-date">${formatDateTime(tx.date)}</div></div>`;
        });
        document.getElementById('transactionContainer').innerHTML = html;
    }
    
    window.showTxDetail = function(id, name, platform, points, dateStr, isPositive, unit) {
        let symbol = isPositive ? '-' : '+';
        let color = isPositive ? '#ff6666' : '#88ff88';
        let detailHtml = `<div class="space-y-3"><div class="flex justify-between py-2 border-b border-gray-700"><span class="text-gray-400">明細編號</span><span class="text-yellow-400">${id}</span></div><div class="flex justify-between py-2 border-b border-gray-700"><span class="text-gray-400">平台</span><span class="text-yellow-400">${platform}</span></div><div class="flex justify-between py-2 border-b border-gray-700"><span class="text-gray-400">點數數量</span><span class="text-xl font-bold" style="color:${color}">${symbol}${points} ${unit}</span></div><div class="flex justify-between py-2"><span class="text-gray-400">時間日期</span><span class="text-yellow-400">${dateStr}</span></div></div>`;
        document.getElementById('txDetailContent').innerHTML = detailHtml;
        document.getElementById('txDetailModal').classList.add('active');
    };
    
    function renderBetModalTable() {
        if (!currentSession) return;
        let details = [...currentSession.details].sort((a, b) => betSortOrder === 'desc' ? new Date(b.date) - new Date(a.date) : new Date(a.date) - new Date(b.date));
        let rows = '';
        let bringInAmount = currentSession.bringInAmount;
        details.forEach(d => {
            let typeLabel = '', typeClass = '';
            if (d.type === 'BRING_IN') { typeLabel = '帶入'; typeClass = 'type-bringin'; }
            else if (d.type === 'BRING_OUT') { typeLabel = '帶出'; typeClass = 'type-bringout'; }
            else { typeLabel = '一般轉'; typeClass = 'type-spin'; }
            let betDisplay = d.type === 'SPIN' ? `-${d.bet}` : '-';
            let winDisplay = d.type === 'SPIN' ? (d.win > 0 ? `+${d.win}` : '-') : '-';
            let totalDisplay = d.type === 'BRING_IN' ? `+${d.win}` : (d.type === 'BRING_OUT' ? `${d.total - bringInAmount >= 0 ? '+' : ''}${Math.floor(d.total - bringInAmount)}` : Math.floor(d.total));
            let totalClass = d.type === 'BRING_IN' ? 'total-positive' : (d.type === 'BRING_OUT' ? (d.total - bringInAmount >= 0 ? 'total-positive' : 'total-negative') : 'amount-total');
            let isFirstSpinBet = (d.type === 'SPIN' && d.isFirstSpin === true);
            rows += `<tr class="${isFirstSpinBet ? 'video-bet-row' : ''}" ${isFirstSpinBet ? `onclick="playCurrentVideo()"` : ''} style="${isFirstSpinBet ? 'cursor:pointer' : ''}"><td style="white-space:nowrap">${formatDateTime(d.date)}</td><td><span class="record-type ${typeClass}">${typeLabel}</span></td><td class="${d.bet > 0 ? 'amount-negative' : ''}">${betDisplay}</td><td class="${d.win > 0 ? 'amount-positive' : ''}">${winDisplay}</td><td class="${totalClass}">${totalDisplay}</td><td><span class="text-blue-300 text-xs">${d.betId}</span>${isFirstSpinBet ? `<span class="play-hint">點擊觀看</span>` : ''}</td></tr>`;
        });
        document.getElementById('betTableHead').innerHTML = `<tr><th onclick="toggleBetSort()">日期時間 <span class="sort-icon">${betSortOrder === 'desc' ? '▼' : '▲'}</span></th><th>類型</th><th>投注</th><th>獲得</th><th>小計</th><th>注單編號</th></tr>`;
        document.getElementById('betModalTableBody').innerHTML = rows;
    }
    
    window.toggleBetSort = function() { betSortOrder = betSortOrder === 'desc' ? 'asc' : 'desc'; renderBetModalTable(); };
    window.openBetModal = function(idx) {
        let f = getFilteredSessions();
        currentSession = f[idx];
        if (!currentSession) return;
        document.getElementById('betModalTitle').innerHTML = `${currentSession.machineName} ${currentSession.machineNumber}`;
        document.getElementById('betStats').innerHTML = `<div class="stat-card">總轉數 ${currentSession.stats.totalSpins}</div><div class="stat-card">總投注 ${currentSession.stats.totalBet}</div><div class="stat-card">總獲得 ${currentSession.stats.totalWin}</div>`;
        renderBetModalTable();
        document.getElementById('betModal').classList.add('active');
    };
    window.playCurrentVideo = function() { if (currentSession && currentSession.videoUrl) { let v = document.getElementById('videoPlayer'); v.src = currentSession.videoUrl; v.load(); v.play().catch(e=>console.log); document.getElementById('videoModal').classList.add('active'); } else { alert('影片載入中'); } };
    window.closeBetModal = () => document.getElementById('betModal').classList.remove('active');
    window.closeVideoModal = () => { let v = document.getElementById('videoPlayer'); v.pause(); v.src = ''; document.getElementById('videoModal').classList.remove('active'); };
    window.closeTxModal = () => document.getElementById('txDetailModal').classList.remove('active');
    window.closeFavoriteModal = () => document.getElementById('favoriteModal').classList.remove('active');
    window.closeKeepModal = () => document.getElementById('keepModal').classList.remove('active');
    
    document.getElementById('favMachinesBtn').onclick = renderFavoriteModal;
    document.getElementById('keepMachinesBtn').onclick = renderKeepModal;
    document.getElementById('supportBtn').onclick = () => alert('客服專線: 0800-666-888');
    document.getElementById('dateSearchBtn').onclick = () => { let s = document.getElementById('startDate').value, e = document.getElementById('endDate').value; dateStart = new Date(s); dateStart.setHours(0,0,0,0); dateEnd = new Date(e); dateEnd.setHours(23,59,59,999); render(); };
    document.getElementById('searchInput').addEventListener('input', (e) => { searchTerm = e.target.value.toLowerCase(); render(); });
    document.getElementById('filterSelect').addEventListener('change', (e) => { currentFilter = e.target.value; render(); });
    document.getElementById('avatarContainer').onclick = () => { let av = ['https://i.pravatar.cc/150?img=7', 'https://i.pravatar.cc/150?img=5', 'https://i.pravatar.cc/150?img=9']; document.getElementById('avatarImage').src = av[Math.floor(Math.random() * av.length)]; alert('更換頭像'); };
    document.getElementById('displayNickname').onclick = () => { let n = prompt('新暱稱', '郝可愛'); if (n) document.getElementById('displayNickname').innerText = n; };
    document.getElementById('headerPoints').onclick = () => alert(`點數: ${userPoints}`);
    document.getElementById('vipBadge').onclick = () => alert('VIP1 特權: 返水0.2%');
    
    updateBadges();
    document.getElementById('transactionContainer').style.display = 'block';
    document.getElementById('sessionsContainer').style.display = 'none';
    render();
})();
</script>
</body>
</html>
