    <script>
        (function() {
            // ==================== 1. 先定義所有全域函數 ====================
            
            // 點數管理變數
            const POINTS_KEY = 't_pachin_user_points';
            let userPoints = 6600;
            
            // 顯示 Loading 動畫並跳轉 (先定義)
            function showHologramLoading(machineName, subName, ratio, machineId, coins) {
                console.log('✅ showHologramLoading 被呼叫', machineName, coins);
                const loadingDiv = document.getElementById('hologramLoading');
                const loadingTitle = document.getElementById('loadingMachineTitle');
                const mascotVideo = document.getElementById('mascotVideo');
                
                if (loadingTitle) loadingTitle.textContent = `${machineName} ${subName} 每枚${ratio}`;
                if (mascotVideo) {
                    mascotVideo.play().catch(e => console.log('影片播放失敗', e));
                }
                if (loadingDiv) loadingDiv.classList.add('show');
                
                // 儲存機台資訊
                const machineInfo = {
                    name: machineName,
                    subName: subName,
                    ratio: ratio,
                    machineId: machineId,
                    coins: coins
                };
                localStorage.setItem('t_pachin_machine_info', JSON.stringify(machineInfo));
                
                // 2.5秒後跳轉
                setTimeout(function() {
                    window.location.href = 'simulator.html';
                }, 2500);
            }
            
            // 收藏進入：顯示點數轉換彈窗
            window.openFavoriteGame = function(machineName, subName, ratio, machineId) {
                console.log('📌 openFavoriteGame 被呼叫', machineName);
                currentEnterData = { machineName, subName, ratio, machineId, type: 'favorite' };
                const confirmName = document.getElementById('confirmMachineName');
                const confirmSub = document.getElementById('confirmSubName');
                const confirmRatio = document.getElementById('confirmRatio');
                const confirmPoints = document.getElementById('confirmPoints');
                const tokenInput = document.getElementById('confirmTokenInput');
                const tokenRemain = document.getElementById('confirmTokenRemain');
                
                if (confirmName) confirmName.textContent = machineName;
                if (confirmSub) confirmSub.textContent = subName;
                if (confirmRatio) confirmRatio.textContent = ratio;
                if (confirmPoints) confirmPoints.textContent = userPoints.toLocaleString();
                if (tokenInput) {
                    tokenInput.value = 100;
                    tokenInput.min = 100;
                }
                if (tokenRemain) tokenRemain.innerHTML = `<i class="fa fa-credit-card"></i> 剩餘點數: ${userPoints.toLocaleString()}`;
                
                const modal = document.getElementById('subConfirmModal');
                if (modal) modal.classList.add('show');
            };
            
            // 保留進入：直接進入
            window.enterReserveGame = function(machineName, subName, ratio, machineId) {
                console.log('🎮 enterReserveGame 被呼叫', machineName);
                showHologramLoading(machineName, subName, ratio, machineId, 100);
            };
            
            // 確認進入（從彈窗）
            function confirmEnterGame() {
                console.log('✅ confirmEnterGame 被呼叫', currentEnterData);
                if (!currentEnterData) return;
                
                const tokenInput = document.getElementById('confirmTokenInput');
                let tokenUsed = tokenInput ? parseInt(tokenInput.value) || 0 : 100;
                if (tokenUsed < 100) {
                    alert('最低兌換數量為 100 代幣！');
                    return;
                }
                if (tokenUsed > userPoints) {
                    alert('點數不足！');
                    return;
                }
                
                // 扣除點數
                userPoints = Math.max(0, userPoints - tokenUsed);
                localStorage.setItem(POINTS_KEY, userPoints);
                updatePointsDisplay();
                
                // 關閉彈窗
                const modal = document.getElementById('subConfirmModal');
                if (modal) modal.classList.remove('show');
                
                // 顯示 Loading 並跳轉
                showHologramLoading(
                    currentEnterData.machineName,
                    currentEnterData.subName,
                    currentEnterData.ratio,
                    currentEnterData.machineId,
                    tokenUsed
                );
            }
            
            // 關閉彈窗
            function closeSubConfirm() {
                const modal = document.getElementById('subConfirmModal');
                if (modal) modal.classList.remove('show');
                currentEnterData = null;
            }
            
            // 更新點數顯示
            function updatePointsDisplay() {
                const userPointsEl = document.getElementById('userPoints');
                if (userPointsEl) userPointsEl.textContent = userPoints.toLocaleString();
                const confirmPoints = document.getElementById('confirmPoints');
                if (confirmPoints) confirmPoints.textContent = userPoints.toLocaleString();
                const tokenRemain = document.getElementById('confirmTokenRemain');
                if (tokenRemain) {
                    const tokenVal = parseInt(document.getElementById('confirmTokenInput')?.value) || 0;
                    tokenRemain.innerHTML = `<i class="fa fa-credit-card"></i> 剩餘點數: ${(userPoints - tokenVal).toLocaleString()}`;
                }
            }
            
            // 保留離開
            window.leaveKeepMachineWithPoints = function(id, name, coinsEarned = 100) {
                if (!confirm(`確定要離開保留的機台「${name}」嗎？\n\n離開後將獲得 ${coinsEarned} 點數（代幣已轉換）`)) return;
                
                userPoints = Math.max(0, userPoints + coinsEarned);
                localStorage.setItem(POINTS_KEY, userPoints);
                updatePointsDisplay();
                alert(`✅ 已離開機台「${name}」，獲得 ${coinsEarned} 點數！`);
                
                keepMachines = keepMachines.filter(m => m.id !== id);
                renderKeep();
            };
            
            // 取消收藏
            window.unfavoriteMachine = function(id, name) { 
                if (!confirm(`確定要取消收藏「${name}」嗎？`)) return; 
                favoriteMachines = favoriteMachines.filter(m => m.id !== id); 
                renderFavorites(); 
                alert(`✅ 已取消收藏「${name}」`); 
            };
            
            // ==================== 2. 載入點數 ====================
            try {
                const stored = localStorage.getItem(POINTS_KEY);
                if (stored !== null) {
                    userPoints = parseInt(stored, 10);
                    if (isNaN(userPoints)) userPoints = 6600;
                }
            } catch(e) {
                userPoints = 6600;
            }
            updatePointsDisplay();
            
            // 綁定彈窗按鈕
            const cancelBtn = document.getElementById('confirmCancel');
            const okBtn = document.getElementById('confirmOk');
            if (cancelBtn) cancelBtn.addEventListener('click', closeSubConfirm);
            if (okBtn) okBtn.addEventListener('click', confirmEnterGame);
            
            // 點數輸入框事件
            const tokenInputField = document.getElementById('confirmTokenInput');
            if (tokenInputField) {
                tokenInputField.addEventListener('input', function() {
                    let val = parseInt(this.value) || 0;
                    if (val < 100) { this.value = 100; val = 100; }
                    if (val > userPoints) { val = userPoints; this.value = userPoints; }
                    const remainSpan = document.getElementById('confirmTokenRemain');
                    if (remainSpan) remainSpan.innerHTML = `<i class="fa fa-credit-card"></i> 剩餘點數: ${(userPoints - val).toLocaleString()}`;
                });
            }
            
            // 點數顯示點擊事件
            const pointsBtn = document.getElementById('headerPoints');
            if (pointsBtn) {
                pointsBtn.addEventListener('click', () => {
                    alert(`💰 目前點數：${userPoints.toLocaleString()}\n\n遊玩機台即可累積點數！`);
                });
            }
            
            // ==================== 3. 機台資料 ====================
            let currentEnterData = null;
            
            let favoriteMachines = [
                { id: 1, name: 'GOGO 小丑', number: 'J001', image: 'https://i.pinimg.com/736x/b1/f1/ec/b1f1ec3a191e62e3d0e300ce79c9b593.jpg', ratio: '2.5', vendor: 'Olympia', model: '6號機' },
                { id: 2, name: '我是小丑-EX', number: 'J002', image: 'https://i.pinimg.com/736x/4a/2a/30/4a2a3089197d997984a7a75921faf2d9.jpg', ratio: '2.8', vendor: 'ELECO', model: '5號機' },
                { id: 3, name: '快樂小丑 VII', number: 'J003', image: 'https://i.pinimg.com/736x/76/a7/ec/76a7eca59c0b7f7a8404e67e043841cb.jpg', ratio: '2.0', vendor: 'HEIWA', model: '6號機' }
            ];
            
            let keepMachines = [
                { id: 4, name: '新我是小丑-EX水晶版', number: 'J004', image: 'https://i.pinimg.com/736x/5a/d2/04/5ad204b86a09d1fc30374422fe0a4070.jpg', ratio: '3.0', vendor: 'Sammy', model: '6號機', endTime: new Date(Date.now() + 10 * 60 * 1000), coins: 250 },
                { id: 5, name: '新我的小丑-EX紅金版', number: 'J005', image: 'https://i.pinimg.com/736x/63/46/aa/6346aaa01a8c68fbf4e8bdb5134cd7b1.jpg', ratio: '3.2', vendor: 'Daito', model: '6號機', endTime: new Date(Date.now() + 15 * 60 * 1000), coins: 380 }
            ];

            function renderFavorites() {
                let html = '';
                favoriteMachines.forEach(m => {
                    html += `<div class="machine-card"><img src="${m.image}" alt="${m.name}"><div class="machine-info"><div class="machine-name">${m.name}</div><div class="machine-meta"><span>${m.number}</span><span>${m.model}</span><span>1:${m.ratio}</span><span>${m.vendor}</span></div></div><div class="machine-actions"><div class="play-btn" onclick="event.stopPropagation(); window.openFavoriteGame('${m.name}', '主機台', '${m.ratio}', ${m.id})"><i class="fa fa-play"></i> 進入</div><div class="unfavorite-btn" onclick="event.stopPropagation(); window.unfavoriteMachine(${m.id}, '${m.name}')"><i class="fa fa-heart"></i> 取消收藏</div></div></div>`;
                });
                const favItems = document.getElementById('favMachineItems');
                if (favItems) favItems.innerHTML = html || '<div class="text-gray-400 text-sm p-4 text-center">暫無收藏機台</div>';
                const favCount = document.getElementById('favCount');
                const favCountDisplay = document.getElementById('favCountDisplay');
                if (favCount) favCount.textContent = favoriteMachines.length;
                if (favCountDisplay) favCountDisplay.textContent = favoriteMachines.length;
            }

            function renderKeep() {
                let html = '';
                keepMachines.forEach(m => {
                    const endDate = new Date(m.endTime);
                    const endTimeStr = endDate.toLocaleString('zh-TW');
                    html += `<div class="machine-card"><img src="${m.image}" alt="${m.name}"><div class="machine-info"><div class="machine-name">${m.name}</div><div class="machine-meta"><span>${m.number}</span><span>${m.model}</span><span>1:${m.ratio}</span><span>${m.vendor}</span></div><div class="countdown-timer" data-endtime="${endDate.toISOString()}"><i class="fa fa-hourglass-half"></i> 計算中...</div><div style="font-size: 0.6rem; color: #aaa; margin-top: 2px;">結束於 ${endTimeStr}</div></div><div class="machine-actions"><div class="play-btn" onclick="event.stopPropagation(); window.enterReserveGame('${m.name}', '主機台', '${m.ratio}', ${m.id})"><i class="fa fa-play"></i> 進入</div><div class="leave-btn" onclick="event.stopPropagation(); window.leaveKeepMachineWithPoints(${m.id}, '${m.name}', ${m.coins || 100})"><i class="fa fa-sign-out"></i> 離開</div></div></div>`;
                });
                const keepItems = document.getElementById('keepMachineItems');
                if (keepItems) keepItems.innerHTML = html || '<div class="text-gray-400 text-sm p-4 text-center">暫無保留機台</div>';
                const keepCount = document.getElementById('keepCount');
                const keepCountDisplay = document.getElementById('keepCountDisplay');
                if (keepCount) keepCount.textContent = keepMachines.length;
                if (keepCountDisplay) keepCountDisplay.textContent = keepMachines.length;
                updateCountdowns();
            }

            function updateCountdowns() {
                document.querySelectorAll('.countdown-timer[data-endtime]').forEach(el => {
                    const endTime = new Date(el.dataset.endtime).getTime();
                    const now = new Date().getTime();
                    const diff = endTime - now;
                    if(diff <= 0) { el.innerHTML = '<i class="fa fa-hourglass-end"></i> 已到期'; el.classList.add('warning'); return; }
                    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                    let timeText = `${minutes}分 ${seconds}秒`;
                    if(minutes < 10) el.classList.add('warning');
                    else el.classList.remove('warning');
                    el.innerHTML = `<i class="fa fa-hourglass-half"></i> 剩餘 ${timeText}`;
                });
            }

            const favBtn = document.getElementById('favMachinesBtn');
            const keepBtn = document.getElementById('keepMachinesBtn');
            const favList = document.getElementById('favMachineList');
            const keepList = document.getElementById('keepMachineList');
            const supportBtn = document.getElementById('supportBtn');
            if (favBtn) favBtn.addEventListener('click', (e) => { e.stopPropagation(); favList.classList.toggle('show'); if(keepList) keepList.classList.remove('show'); });
            if (keepBtn) keepBtn.addEventListener('click', (e) => { e.stopPropagation(); keepList.classList.toggle('show'); if(favList) favList.classList.remove('show'); if(keepList.classList.contains('show')) updateCountdowns(); });
            if (supportBtn) supportBtn.addEventListener('click', () => alert('📞 客服與幫助'));

            document.addEventListener('click', function(e) {
                if(favList && keepList && favBtn && keepBtn) {
                    if(!favBtn.contains(e.target) && !keepBtn.contains(e.target) && !favList.contains(e.target) && !keepList.contains(e.target)) {
                        favList.classList.remove('show');
                        keepList.classList.remove('show');
                    }
                }
            });
            setInterval(() => { if(keepList && keepList.classList.contains('show')) updateCountdowns(); }, 1000);

            // ==================== 4. 注單資料 (保持原有功能) ====================
            let betSortOrder = 'desc';
            let searchTerm = '';
            let dateStart = new Date('2025-02-01');
            let dateEnd = new Date('2025-03-31');
            dateEnd.setHours(23, 59, 59);

            function generateSessions() {
                const sessions = [];
                let spinCounter = 1;
                const clownMachines = [
                    { name: 'GOGO 小丑', number: 'J001', img: 'https://i.pinimg.com/736x/b1/f1/ec/b1f1ec3a191e62e3d0e300ce79c9b593.jpg' },
                    { name: '我是小丑-EX', number: 'J002', img: 'https://i.pinimg.com/736x/4a/2a/30/4a2a3089197d997984a7a75921faf2d9.jpg' },
                    { name: '快樂小丑 VII', number: 'J003', img: 'https://i.pinimg.com/736x/76/a7/ec/76a7eca59c0b7f7a8404e67e043841cb.jpg' },
                    { name: '新我是小丑-EX水晶版', number: 'J004', img: 'https://i.pinimg.com/736x/5a/d2/04/5ad204b86a09d1fc30374422fe0a4070.jpg' },
                    { name: '新我的小丑-EX紅金版', number: 'J005', img: 'https://i.pinimg.com/736x/63/46/aa/6346aaa01a8c68fbf4e8bdb5134cd7b1.jpg' }
                ];
                clownMachines.forEach((machine, idx) => {
                    const baseDate = new Date(2025, 1, 19 + idx, 20, 30 + idx * 10);
                    const session = { id: `session-${idx + 1}`, machineName: machine.name, machineNumber: machine.number, bringInTime: new Date(baseDate), bringInAmount: 300 + idx * 50, bringOutTime: new Date(baseDate.getTime() + 45 * 60000), bringOutAmount: 350 + idx * 60, details: [], stats: { totalSpins: 0, totalBet: 0, totalWin: 0, bbCount: 0 } };
                    session.details.push({ date: new Date(session.bringInTime), type: 'BRING_IN', bet: 0, win: session.bringInAmount, total: session.bringInAmount, betId: `INIT${String(idx + 1).padStart(3, '0')}`, videoType: null });
                    let currentTotal = session.bringInAmount;
                    let currentTime = new Date(session.bringInTime);
                    for (let i = 0; i < 12; i++) {
                        currentTime = new Date(currentTime.getTime() + (1 + Math.random() * 2) * 60000);
                        const bet = 3;
                        const win = Math.random() < 0.3 ? bet * (1 + Math.floor(Math.random() * 2)) : 0;
                        currentTotal = currentTotal - bet + win;
                        session.details.push({ date: new Date(currentTime), type: 'SPIN', bet: bet, win: win, total: currentTotal, betId: `SPIN${String(spinCounter++).padStart(4, '0')}`, videoType: null });
                        session.stats.totalSpins++;
                        session.stats.totalBet += bet;
                        session.stats.totalWin += win;
                    }
                    for (let i = 0; i < 18; i++) {
                        currentTime = new Date(currentTime.getTime() + (0.5 + Math.random()) * 60000);
                        const bet = 2;
                        const win = 8 + Math.floor(Math.random() * 8);
                        currentTotal = currentTotal - bet + win;
                        session.details.push({ date: new Date(currentTime), type: 'BB', bet: bet, win: win, total: currentTotal, betId: `BB${String(spinCounter++).padStart(4, '0')}`, videoType: 'BB' });
                        session.stats.totalSpins++;
                        session.stats.totalBet += bet;
                        session.stats.totalWin += win;
                        session.stats.bbCount++;
                    }
                    session.bringOutAmount = currentTotal;
                    session.details.push({ date: new Date(session.bringOutTime), type: 'BRING_OUT', bet: session.bringOutAmount, win: 0, total: 0, betId: `OUT${String(idx + 1).padStart(3, '0')}`, videoType: null });
                    session.netProfit = session.bringOutAmount - session.bringInAmount;
                    sessions.push(session);
                });
                return sessions;
            }

            let sessions = generateSessions();
            let currentSession = null;

            function filterSessions() {
                let filtered = sessions.filter(s => { const sessionDate = new Date(s.bringInTime); const sessionDateStr = sessionDate.toISOString().split('T')[0]; const startStr = dateStart.toISOString().split('T')[0]; const endStr = dateEnd.toISOString().split('T')[0]; return sessionDateStr >= startStr && sessionDateStr <= endStr; });
                if (searchTerm) { const term = searchTerm.toLowerCase(); filtered = filtered.filter(s => s.machineName.toLowerCase().includes(term) || s.machineNumber.toLowerCase().includes(term)); }
                return filtered;
            }
            function formatDateTime(date) { return date.toLocaleString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }); }
            function formatDate(date) { return date.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '/'); }
            function formatTime(date) { return date.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false }); }

            function calculateTotals() {
                const filtered = filterSessions();
                let totalBet = 0, totalWin = 0;
                filtered.forEach(session => { totalBet += session.stats.totalBet; totalWin += session.stats.totalWin; });
                const totalNet = totalWin - totalBet;
                const totalBetEl = document.getElementById('totalBet');
                const totalWinEl = document.getElementById('totalWin');
                const totalNetEl = document.getElementById('totalNet');
                if (totalBetEl) totalBetEl.textContent = totalBet;
                if (totalWinEl) totalWinEl.textContent = totalWin;
                if (totalNetEl) { totalNetEl.textContent = totalNet >= 0 ? `+${totalNet}` : totalNet; totalNetEl.classList.remove('text-green-400', 'text-red-400'); totalNetEl.classList.add(totalNet >= 0 ? 'text-red-400' : 'text-green-400'); }
            }

            function renderSessions() {
                const filtered = filterSessions();
                let html = '';
                filtered.forEach((session, index) => {
                    const bringInDate = formatDate(session.bringInTime);
                    const bringOutDate = formatDate(session.bringOutTime);
                    const bringInTime = formatTime(session.bringInTime);
                    const bringOutTime = formatTime(session.bringOutTime);
                    const netProfit = session.netProfit;
                    const netClass = netProfit >= 0 ? 'positive' : 'negative';
                    const netSign = netProfit >= 0 ? '+' : '';
                    html += `<div class="main-row" onclick="openBetModal(${index})"><div><div class="machine-title"><span class="name">${session.machineName}</span><span class="number">#${session.machineNumber}</span></div><div class="date-range">${bringInDate} ~ ${bringOutDate}  ${bringInTime}~${bringOutTime}</div><div class="amount-info"><span class="bring-in">帶入 ${session.bringInAmount}</span><span class="text-gray-400">→</span><span class="bring-out">帶出 ${session.bringOutAmount}</span><span class="text-gray-400">|</span><span class="net-profit ${netClass}">淨利 ${netSign}${netProfit}</span></div></div></div>`;
                });
                const sessionsContainer = document.getElementById('sessionsContainer');
                if (sessionsContainer) sessionsContainer.innerHTML = html || '<div class="text-center text-gray-400 py-8">沒有注單記錄</div>';
                calculateTotals();
            }

            window.openBetModal = function(index) {
                currentSession = sessions[index];
                const modalTitle = document.getElementById('betModalTitle');
                if (modalTitle) modalTitle.textContent = `${currentSession.machineName} #${currentSession.machineNumber}`;
                const winRate = currentSession.stats.totalSpins > 0 ? Math.round((currentSession.stats.totalWin / currentSession.stats.totalBet) * 100) : 0;
                const betStats = document.getElementById('betStats');
                if (betStats) betStats.innerHTML = `<div class="stat-card"><i class="fa fa-refresh"></i><span>總轉數</span><span>${currentSession.stats.totalSpins}</span></div><div class="stat-card"><i class="fa fa-arrow-down"></i><span>總投注</span><span>${currentSession.stats.totalBet}</span></div><div class="stat-card"><i class="fa fa-arrow-up"></i><span>總獲得</span><span>${currentSession.stats.totalWin}</span></div><div class="stat-card"><i class="fa fa-film"></i><span>BB</span><span>${currentSession.stats.bbCount}</span></div><div class="stat-card"><i class="fa fa-pie-chart"></i><span>勝率</span><span>${winRate}%</span></div>`;
                renderBetModalTable();
                const betModal = document.getElementById('betModal');
                if (betModal) betModal.classList.add('active');
            };
            window.toggleBetSort = function() { betSortOrder = betSortOrder === 'desc' ? 'asc' : 'desc'; const sortIcon = document.getElementById('betSortIcon'); if (sortIcon) sortIcon.textContent = betSortOrder === 'desc' ? '▼' : '▲'; renderBetModalTable(); };
            function renderBetModalTable() {
                if (!currentSession) return;
                let details = [...currentSession.details].sort((a, b) => betSortOrder === 'desc' ? b.date - a.date : a.date - b.date);
                let html = '';
                details.forEach(d => { let typeClass = '', typeLabel = ''; if(d.type === 'BRING_IN') { typeLabel = '帶入'; typeClass = 'type-bringin'; } else if(d.type === 'BRING_OUT') { typeLabel = '帶出'; typeClass = 'type-bringout'; } else if(d.type === 'BB') { typeLabel = 'BB'; typeClass = 'type-bb'; } else { typeLabel = '一般'; typeClass = 'type-bet'; } html += `<tr><td class="text-blue-200">${formatDateTime(d.date)}</td><td><span class="record-type ${typeClass}">${typeLabel}</span></td><td class="${d.bet > 0 ? 'amount-negative' : ''}">${d.bet > 0 ? `-${d.bet}` : '-'}</td><td class="${d.win > 0 ? 'amount-positive' : ''}">${d.win > 0 ? `+${d.win}` : '-'}</td><td class="amount-total">${d.total}</td><td><span class="bet-id" onclick="event.stopPropagation(); openBetDetail('${d.betId}', '${d.type}', ${d.total})">${d.betId}</span></td><td>${d.videoType ? `<span class="video-tag"><i class="fa fa-film"></i> ${d.videoType}</span>` : '-'}</td></tr>`; });
                const tableBody = document.getElementById('betModalTableBody');
                if (tableBody) tableBody.innerHTML = html;
            }
            window.openBetDetail = function(betId, type, total) {
                const detailTitle = document.getElementById('betDetailTitle');
                if (detailTitle) detailTitle.textContent = `注單 ${betId}`;
                let content = '';
                if (type === 'BRING_IN') content = `<div class="row"><span class="label">類型</span><span class="value">點數轉代幣</span></div><div class="row"><span class="label">匯率</span><span class="value">1:1</span></div><div class="row"><span class="label">獲得代幣</span><span class="value positive">+${total}</span></div>`;
                else if (type === 'BRING_OUT') { const net = currentSession?.bringOutAmount - currentSession?.bringInAmount || 0; const netClass = net >= 0 ? 'positive' : 'negative'; content = `<div class="row"><span class="label">類型</span><span class="value">代幣轉點數</span></div><div class="row"><span class="label">總轉數</span><span class="value">${currentSession?.stats.totalSpins || 0}</span></div><div class="row"><span class="label">淨獲得</span><span class="value ${netClass}">${net >= 0 ? '+' : ''}${net}</span></div>`; }
                else content = `<div class="row"><span class="label">類型</span><span class="value">${type === 'BB' ? '大當' : '一般轉數'}</span></div><div class="row"><span class="label">注單編號</span><span class="value">${betId}</span></div><div class="row"><span class="label">合計</span><span class="value">${total}</span></div>`;
                const detailContent = document.getElementById('betDetailContent');
                if (detailContent) detailContent.innerHTML = content;
                const detailModal = document.getElementById('betDetailModal');
                if (detailModal) detailModal.classList.add('active');
            };
            window.closeBetModal = () => { const modal = document.getElementById('betModal'); if (modal) modal.classList.remove('active'); };
            window.closeBetDetailModal = () => { const modal = document.getElementById('betDetailModal'); if (modal) modal.classList.remove('active'); };

            const searchInput = document.getElementById('searchInput');
            const startDateInput = document.getElementById('startDate');
            const endDateInput = document.getElementById('endDate');
            const dateSearchBtn = document.getElementById('dateSearchBtn');
            if (searchInput) searchInput.addEventListener('input', (e) => { searchTerm = e.target.value; renderSessions(); });
            if (dateSearchBtn) dateSearchBtn.addEventListener('click', () => { if (startDateInput && endDateInput) { dateStart = new Date(startDateInput.value); dateEnd = new Date(endDateInput.value); dateEnd.setHours(23, 59, 59); renderSessions(); } });

            const vipPanel = document.getElementById('vipInfoPanel');
            const vipBadge = document.getElementById('vipBadge');
            const expTextEl = document.getElementById('expText');
            if (vipBadge) vipBadge.addEventListener('click', () => vipPanel?.classList.toggle('hidden'));
            if (expTextEl) expTextEl.addEventListener('click', () => vipPanel?.classList.toggle('hidden'));
            const avatarContainer = document.getElementById('avatarContainer');
            if (avatarContainer) avatarContainer.addEventListener('click', () => { const avatars = ['https://i.pravatar.cc/150?img=7','https://i.pravatar.cc/150?img=5','https://i.pravatar.cc/150?img=9']; const avatarImage = document.getElementById('avatarImage'); if (avatarImage) avatarImage.src = avatars[Math.floor(Math.random() * avatars.length)]; alert('大頭照已更換'); });
            const displayNickname = document.getElementById('displayNickname');
            if (displayNickname) displayNickname.addEventListener('click', () => { let name = prompt('修改暱稱', '郝可愛'); if(name) displayNickname.textContent = name; });

            renderFavorites();
            renderKeep();
            renderSessions();
            
            const style = document.createElement('style');
            style.textContent = `.machine-list-container.show { display: block; } .machine-list-container { display: none; } .positive { color: #ff8888; } .negative { color: #88ff88; } .video-tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 30px; font-size: 0.7rem; background: linear-gradient(135deg, #667eea, #764ba2); color: white; }`;
            document.head.appendChild(style);
        })();
    </script>
</body>
</html>
